<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Verdict 360 AI — Mode Présentateur (privé)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --noir:#0A0A0A; --noir2:#141414; --noir3:#1E1A12;
    --or:#B8954A; --orbd:#9C7F3D; --orref:#D4C28E; --orhi:#F0E4C0;
    --grad:linear-gradient(110deg,#9C7F3D 0%,#B8954A 35%,#F0E4C0 50%,#B8954A 65%,#9C7F3D 100%);
    --conf:#66BB6A; --crit:#FF7043;
    --blanc:#F5F1E6; --gris:rgba(245,241,230,0.55);
  }
  html,body { height:100%; background:var(--noir); color:var(--blanc);
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif; overflow:hidden; }

  .wrap { display:flex; flex-direction:column; height:100%; padding:14px 14px 0; }

  .topbar { display:flex; align-items:center; justify-content:space-between;
    gap:10px; padding-bottom:10px; border-bottom:1px solid rgba(184,149,74,0.3); }
  .priv { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--crit);
    border:1px solid var(--crit); border-radius:6px; padding:3px 8px; }
  .pos { font-size:13px; color:var(--gris); letter-spacing:1px; }
  .pos b { color:var(--orhi); }
  .chrono { font-family:Georgia,serif; font-size:22px; font-weight:700;
    background:var(--grad); -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; }
  .chrono.run { -webkit-text-fill-color:var(--conf); color:var(--conf); }

  .now { background:radial-gradient(ellipse at 50% 0%, #181408 0%, var(--noir2) 70%);
    border:1px solid rgba(184,149,74,0.3); border-radius:14px;
    padding:16px 18px; margin-top:12px; text-align:center; flex-shrink:0; }
  .now .eyebrow { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--or); }
  .now h2 { font-family:Georgia,serif; font-size:clamp(18px,4.5vw,26px);
    line-height:1.15; margin:6px 0 4px; color:var(--blanc); }
  .now h2 .g { background:var(--grad); -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; }
  .now .tgt { font-size:11px; color:var(--gris); letter-spacing:1px; margin-top:6px; }
  .now .tgt b { color:var(--orhi); }

  .scriptbox { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
    margin-top:12px; padding:4px 2px; }
  .scriptbox-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .scriptbox h4 { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--or); }
  .scriptbox p { font-size:clamp(17px,3.4vw,22px); line-height:1.6; color:#F5F1E6 !important; opacity:1 !important; }

  /* Bouton lecture vocale */
  .btn-lire {
    display:flex; align-items:center; gap:6px;
    background:transparent; border:1px solid var(--or);
    border-radius:20px; padding:5px 14px;
    color:var(--orhi); font-size:12px; font-weight:700;
    letter-spacing:0.08em; text-transform:uppercase;
    cursor:pointer; font-family:-apple-system,Arial,sans-serif;
    touch-action:manipulation; -webkit-tap-highlight-color:transparent;
    transition:background 0.15s;
    flex-shrink:0;
  }
  .btn-lire.actif { background:var(--or); color:var(--noir); }
  .btn-lire .icone { font-size:14px; }

  .next { flex-shrink:0; margin-top:8px; padding:10px 14px;
    background:var(--noir3); border-radius:10px; border:1px solid rgba(184,149,74,0.18); }
  .next span { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--or); }
  .next div { font-size:13px; color:var(--gris); margin-top:3px; }

  .ctrl { flex-shrink:0; display:flex; gap:10px; align-items:stretch;
    padding:12px 0 calc(12px + env(safe-area-inset-bottom)); }
  .ctrl button { background:var(--noir2); color:var(--orhi);
    border:1px solid var(--or); border-radius:12px; font-weight:700; }
  .ctrl .nav { font-size:26px; width:64px; }
  .ctrl .nav:active { background:var(--or); color:var(--noir); }
  .ctrl .mid { flex:1; font-size:15px; }
  .ctrl .mid:active { background:var(--or); color:var(--noir); }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <span class="priv">Privé — ne pas partager</span>
    <span class="pos"><b id="cur">1</b> / <span id="tot">11</span></span>
    <span class="chrono" id="chrono">0:00</span>
  </div>

  <div class="now">
    <div class="eyebrow" id="eb">Présentation officielle</div>
    <h2 id="title">Verdict <span class="g">360</span> AI</h2>
    <div class="tgt">Temps cible : <b id="tgt">0:30</b></div>
  </div>

  <div class="scriptbox">
    <div class="scriptbox-header">
      <h4>Ce que tu dois dire</h4>
      <button class="btn-lire" id="btn-lire" onclick="toggleLecture()">
        <span class="icone" id="lire-icone">▶</span>
        <span id="lire-label">Lire</span>
      </button>
    </div>
    <p id="script"></p>
  </div>

  <div class="next">
    <span>Slide suivante</span>
    <div id="next">—</div>
  </div>

  <div class="ctrl">
    <button class="nav" id="prev">&#8249;</button>
    <button class="mid" id="clock">&#9201; Démarrer le chrono</button>
    <button class="nav" id="next-btn">&#8250;</button>
  </div>

</div>

<script>
(function(){
  var slides = [
    { eb:"Présentation officielle", title:'Verdict <span class="g">360</span> AI', tgt:"0:30",
      script:"Bonjour, je m'appelle Jacques Perrier. Aujourd'hui je vous présente Verdict 360 AI : la première plateforme qui combine l'intelligence artificielle et l'expertise humaine d'un auditeur pour protéger votre établissement face au MAPAQ. Six modules, un seul écosystème. Dix minutes, et vous comprendrez exactement comment ça protège votre entreprise." },
    { eb:"Votre expert", title:"Jacques Perrier", tgt:"1:00",
      script:"J'ai passé plus de vingt ans dans le milieu alimentaire : d'abord comme chef-propriétaire, ensuite comme auditeur en hygiène et salubrité. Je connais les deux côtés du comptoir : la pression des opérations ET les exigences des inspecteurs. C'est exactement cette double expérience que Verdict 360 AI met dans votre poche." },
    { eb:"Le constat", title:"Une inspection peut tout changer", tgt:"1:00",
      script:"Le problème est simple : la majorité des établissements gèrent leur conformité avec du papier, de la mémoire et de la bonne volonté. Résultat : quand l'inspecteur du MAPAQ arrive, c'est lui qui découvre vos problèmes avant vous. Et une condamnation, c'est public — vos clients la voient en ligne. La question n'est pas SI vous serez inspecté, mais QUAND." },
    { eb:"La solution", title:'Voyez tout. <span class="g">Avant le MAPAQ.</span>', tgt:"1:00",
      script:"Verdict 360 AI inverse le rapport de force. Au lieu de subir l'inspection, vous la simulez en continu. L'intelligence artificielle analyse vos photos, détecte les non-conformités, et moi, comme auditeur, je valide et je priorise chaque correction : immédiat, urgent 24 heures, urgent 48 heures, ou planifié. Tout se fait depuis un téléphone. Aucun papier." },
    { eb:"L'écosystème complet", title:'6 modules. <span class="g">1 plateforme.</span>', tgt:"1:00",
      script:"Voici l'écosystème complet : six modules qui couvrent chaque angle mort de votre conformité. 360, le cœur de la plateforme. PUNCH pour le pointage. SÉCURITÉ pour les inspections. HYGIÈNE pour le nettoyage. CONTRÔLE pour vos fournisseurs. Et ACADÉMIE pour former votre équipe. Je vous les présente un par un — rapidement." },
    { eb:"Module 1 sur 6", title:'<span class="g">◆ 360</span> — Le bouclier', tgt:"1:00",
      script:"Le module 360, c'est le cœur. Je viens dans votre établissement, je documente chaque zone avec des photos que l'intelligence artificielle annote automatiquement. Vous recevez un rapport officiel au format MAPAQ avec un plan d'actions signé — un document que vous pouvez littéralement remettre à l'inspecteur comme preuve de bonne foi. Et le suivi continue à 30 et 60 jours." },
    { eb:"Modules 2 et 3 sur 6", title:"SÉCURITÉ · HYGIÈNE", tgt:"1:00",
      script:"SÉCURITÉ, c'est votre inspecteur interne dans votre poche : des rondes illimitées depuis votre téléphone, avec un score simulé en temps réel. Vous savez toujours où vous en êtes. HYGIÈNE remplace tous vos registres papier de nettoyage : chaque vérification est horodatée et archivée. Quand l'inspecteur demande vos registres, vous les montrez en deux clics." },
    { eb:"Modules 4 et 5 sur 6", title:"PUNCH · CONTRÔLE", tgt:"1:00",
      script:"PUNCH règle un problème que tous les gestionnaires connaissent : le pointage frauduleux. GPS, selfie, NIP — impossible de puncher pour un collègue. Et c'est déjà déployé en entreprise, c'est du concret. CONTRÔLE, lui, documente votre chaîne du froid à la réception : chaque livraison, chaque température, chaque fournisseur. En cas de rappel ou d'enquête, votre traçabilité est béton." },
    { eb:"Module 6 sur 6", title:"ACADÉMIE — Former, c'est prévenir", tgt:"0:45",
      script:"Dernier module : ACADÉMIE. La cause numéro un des non-conformités répétées, c'est le personnel mal formé. ACADÉMIE forme vos employés directement sur leur téléphone : formations interactives, quiz, suivi des certifications. Un employé formé, c'est une non-conformité évitée." },
    { eb:"Le retour sur investissement", title:'Ce que ça vous <span class="g">rapporte</span>', tgt:"1:00",
      script:"Parlons chiffres. Une condamnation publique du MAPAQ, c'est des clients qui ne reviennent pas — ça peut coûter des milliers de dollars. Verdict 360 AI coûte moins cher qu'une seule journée de fermeture. Et en bonus : environ quinze heures de paperasse éliminées par mois. La conformité passe de fardeau à avantage concurrentiel." },
    { eb:"Passez à l'action", title:"Trois niveaux de protection", tgt:"0:45",
      script:"Trois niveaux de protection, selon vos besoins : Essentiel pour l'audit ponctuel, Complet pour la protection continue avec les six modules, et Entreprise pour les multi-établissements. La prochaine étape est simple : une visite d'évaluation gratuite. Je vous laisse mes coordonnées — quand est-ce qu'on planifie ça?" }
  ];

  var n = slides.length, cur = 0;
  var elCur = document.getElementById('cur'),
      elTot = document.getElementById('tot'),
      elEb = document.getElementById('eb'),
      elTitle = document.getElementById('title'),
      elTgt = document.getElementById('tgt'),
      elScript = document.getElementById('script'),
      elNext = document.getElementById('next'),
      elChrono = document.getElementById('chrono'),
      btnClock = document.getElementById('clock'),
      btnLire = document.getElementById('btn-lire'),
      lireIcone = document.getElementById('lire-icone'),
      lireLabel = document.getElementById('lire-label');
  elTot.textContent = n;

  // ── LECTURE VOCALE ──
  var synth = window.speechSynthesis;
  var enLecture = false;

  function stopLecture() {
    if (synth) synth.cancel();
    enLecture = false;
    btnLire.classList.remove('actif');
    lireIcone.textContent = '▶';
    lireLabel.textContent = 'Lire';
  }

  window.toggleLecture = function() {
    if (!synth) { alert("Lecture vocale non supportée sur ce navigateur."); return; }
    if (enLecture) {
      stopLecture();
    } else {
      var texte = elScript.textContent;
      var utt = new SpeechSynthesisUtterance(texte);
      utt.lang = 'fr-CA';
      utt.rate = 0.92;
      utt.pitch = 1;

      // Cibler Amélie fr-CA (voix visible par Safari iOS)
      var voix = synth.getVoices();
      var voixFR = voix.find(function(v){ return v.name === 'Amélie'; })
                || voix.find(function(v){ return v.lang === 'fr-CA'; })
                || voix.find(function(v){ return v.name === 'Thomas'; })
                || voix.find(function(v){ return v.lang.startsWith('fr'); });
      if (voixFR) utt.voice = voixFR;

      utt.onend = function() { stopLecture(); };
      utt.onerror = function() { stopLecture(); };

      synth.speak(utt);
      enLecture = true;
      btnLire.classList.add('actif');
      lireIcone.textContent = '■';
      lireLabel.textContent = 'Arrêter';
    }
  };

  // Arrêter la lecture quand on change de slide
  function strip(html){ return html.replace(/<[^>]+>/g,''); }
  function show(i){
    if(i<0) i=0; if(i>n-1) i=n-1; cur=i;
    stopLecture();
    var s = slides[cur];
    elCur.textContent = cur+1;
    elEb.textContent = s.eb;
    elTitle.innerHTML = s.title;
    elTgt.textContent = s.tgt;
    elScript.textContent = s.script;
    elNext.textContent = (cur < n-1) ? strip(slides[cur+1].title) : "— Fin de la présentation —";
    document.querySelector('.scriptbox').scrollTop = 0;
  }

  // Charger les voix (iOS les charge en async)
  function chargerVoix() { if (synth) synth.getVoices(); }
  chargerVoix();
  if (synth && synth.onvoiceschanged !== undefined) { synth.onvoiceschanged = chargerVoix; }
  setTimeout(chargerVoix, 500);
  setTimeout(chargerVoix, 1500);

  // Appui long sur ▶ Lire = diagnostic des voix FR disponibles
  var holdTimer = null;
  btnLire.addEventListener('touchstart', function() {
    holdTimer = setTimeout(function() {
      var voix = synth.getVoices();
      var noms = voix.filter(function(v){ return v.lang.startsWith('fr'); })
                     .map(function(v){ return v.name + ' [' + v.lang + ']'; });
      alert('Voix FR trouvées :\n' + (noms.length ? noms.join('\n') : 'Aucune'));
    }, 1500);
  });
  btnLire.addEventListener('touchend', function() { clearTimeout(holdTimer); });
  btnLire.addEventListener('touchmove', function() { clearTimeout(holdTimer); });

  var sec=0, timer=null;
  function pad(x){ return x<10 ? '0'+x : ''+x; }
  function tick(){ sec++; elChrono.textContent = Math.floor(sec/60)+':'+pad(sec%60); }
  btnClock.addEventListener('touchend', function(e){
    e.preventDefault();
    if(timer){ clearInterval(timer); timer=null; elChrono.className='chrono';
      btnClock.innerHTML='&#9201; Reprendre le chrono'; }
    else { timer=setInterval(tick,1000); elChrono.className='chrono run';
      btnClock.innerHTML='&#10073;&#10073; Pause chrono'; }
  });
  btnClock.onclick = function(){
    if(timer){ clearInterval(timer); timer=null; elChrono.className='chrono';
      btnClock.innerHTML='&#9201; Reprendre le chrono'; }
    else { timer=setInterval(tick,1000); elChrono.className='chrono run';
      btnClock.innerHTML='&#10073;&#10073; Pause chrono'; }
  };

  document.getElementById('prev').addEventListener('touchend', function(e){ e.preventDefault(); show(cur-1); });
  document.getElementById('next-btn').addEventListener('touchend', function(e){ e.preventDefault(); show(cur+1); });
  document.getElementById('prev').onclick = function(){ show(cur-1); };
  document.getElementById('next-btn').onclick = function(){ show(cur+1); };

  document.onkeydown = function(e){
    if(e.keyCode===39||e.keyCode===32) show(cur+1);
    if(e.keyCode===37) show(cur-1);
  };

  show(0);
})();
</script>
</body>
</html>
