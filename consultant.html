<script>
var QUICK={fr:[{label:"🌡️ Températures",q:"Quelles sont les températures de sécurité alimentaire?"},{label:"📋 Inspection MAPAQ",q:"Comment préparer une inspection MAPAQ?"},{label:"🔍 HACCP & CCP",q:"Explique-moi les 7 principes HACCP et les CCP"},{label:"🍁 AICA & ACIA",q:"Quelle est la différence entre l'AICA, l'ACIA et le MAPAQ?"},{label:"⚠️ Non-conformités",q:"Quelles sont les non-conformités les plus fréquentes?"},{label:"📝 Documents requis",q:"Quels documents dois-je avoir pour être conforme MAPAQ?"},{label:"🧹 Plan nettoyage",q:"Comment créer un plan de nettoyage conforme HACCP?"},{label:"🚨 Allergènes",q:"Comment gérer les allergènes selon MAPAQ et ACIA?"}],en:[{label:"🌡️ Temperatures",q:"What are the food safety temperatures I need to respect?"},{label:"📋 MAPAQ Inspection",q:"How do I prepare for a MAPAQ inspection?"},{label:"🔍 HACCP & CCPs",q:"Explain the 7 HACCP principles and CCPs"},{label:"🍁 AICA & CFIA",q:"What is the difference between AICA, CFIA and MAPAQ?"},{label:"⚠️ Non-conformities",q:"What are the most common non-conformities?"},{label:"📝 Required documents",q:"What documents do I need to be MAPAQ and HACCP compliant?"},{label:"🧹 Cleaning plan",q:"How do I create a HACCP-compliant cleaning plan?"},{label:"🚨 Allergens",q:"How do I manage allergens according to MAPAQ and CFIA?"}]};
function norm(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function getResponse(q,lang){var n=norm(q),best=null,bs=0;KB.forEach(function(e){var sc=0,kws=(e['kw_'+lang]||[]).concat(e['kw_'+(lang==='fr'?'en':'fr')]||[]);kws.forEach(function(k){var kn=norm(k);if(n.includes(kn))sc+=3;else if(n.includes(kn.substring(0,Math.max(4,kn.length-2))))sc+=1;});if(sc>bs){bs=sc;best=e;}});if(best&&bs>=2)return best[lang]||best.fr;return lang==='fr'?'## 🤝 Je suis VERDICT 360 AI\n\nPosez vos questions sur :\n\n🌡️ Températures de sécurité\n📋 Inspection MAPAQ\n🔍 HACCP & CCP\n🍁 AICA & ACIA\n🧹 Nettoyage et désinfection\n⚠️ Non-conformités\n📝 Documents obligatoires\n🚨 Allergènes\n\n📧 info@verdict360ai.com\n📞 +1 (873) 822-1455':'## 🤝 I am VERDICT 360 AI\n\nAsk me about:\n\n🌡️ Food safety temperatures\n📋 MAPAQ inspection\n🔍 HACCP & CCPs\n🍁 AICA & CFIA\n🧹 Cleaning and sanitation\n⚠️ Non-conformities\n📝 Mandatory documents\n🚨 Allergens\n\n📧 info@verdict360ai.com\n📞 +1 (873) 822-1455';}
function detectLang(t){var fr=["quelles","comment","préparer","pourquoi","quand","quel","aide","besoin","faire","avoir","expliqu"],en=["what","how","when","why","which","help","need","can","should","explain"],tx=t.toLowerCase(),fs=fr.filter(function(w){return tx.includes(w);}).length,es=en.filter(function(w){return tx.includes(w);}).length;return es>fs?'en':'fr';}
function formatResp(text){return text.split('\n').map(function(line){if(!line)return '<div class="resp-spacer"></div>';if(line.startsWith('## '))return '<div class="resp-h2">'+line.slice(3)+'</div>';if(line.startsWith('### '))return '<div class="resp-h3">'+line.slice(4)+'</div>';if(line.startsWith('**')&&line.endsWith('**'))return '<div class="resp-bold">'+line.slice(2,-2)+'</div>';if(line.startsWith('|'))return '<code class="resp-table">'+line+'</code>';if(line.startsWith('• '))return '<div class="resp-bullet">'+line+'</div>';if(/^\d+\. /.test(line))return '<div class="resp-bullet">'+line+'</div>';return '<div class="resp-line">'+line+'</div>';}).join('');}
function appendMsg(role,content){var chat=document.getElementById('chat-area'),row=document.createElement('div');row.className='msg-row '+role;if(role==='assistant'){row.innerHTML='<div class="msg-avatar">V</div><div class="msg-bubble assistant">'+formatResp(content)+'</div>';}else{row.innerHTML='<div class="msg-bubble user">'+content+'</div>';}chat.appendChild(row);row.scrollIntoView({behavior:'smooth',block:'end'});}
function showTyping(){var chat=document.getElementById('chat-area'),row=document.createElement('div');row.className='msg-row assistant';row.id='typing';row.innerHTML='<div class="msg-avatar">V</div><div class="msg-bubble assistant"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';chat.appendChild(row);row.scrollIntoView({behavior:'smooth',block:'end'});}
function removeTyping(){var t=document.getElementById('typing');if(t)t.remove();}
function sendMessage(text){var field=document.getElementById('input-field'),t=(text||field.value).trim();if(!t||isLoading)return;var lang=detectLang(t);currentLang=lang;updateLangUI();if(welcomeShown){document.getElementById('chat-area').innerHTML='';welcomeShown=false;}field.value='';field.style.height='auto';document.getElementById('send-btn').disabled=true;appendMsg('user',t);isLoading=true;showTyping();setTimeout(function(){removeTyping();appendMsg('assistant',getResponse(t,lang));isLoading=false;document.getElementById('input-field').focus();},500+Math.random()*400);}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';document.getElementById('send-btn').disabled=!el.value.trim();}
function renderWelcome(){var L=currentLang,pillars=[{icon:'🏛️',title:'MAPAQ',desc:L==='fr'?'Normes provinciales QC':'QC provincial standards'},{icon:'🔬',title:'HACCP',desc:L==='fr'?'7 principes & CCP':'7 principles & CCPs'},{icon:'🍁',title:'AICA/ACIA',desc:L==='fr'?'Juridiction fédérale':'Federal jurisdiction'}],qs=QUICK[L];return '<div class="welcome-card"><div class="welcome-center"><div class="welcome-icon">🏆</div><div class="welcome-title">'+(L==='fr'?'Bonjour — je suis VERDICT 360 AI':'Hello — I\'m VERDICT 360 AI')+'</div><div class="welcome-sub">'+(L==='fr'?'Expert MAPAQ · HACCP · AICA — 24/7':'MAPAQ · HACCP · AICA Expert — 24/7')+'</div></div><div class="pillars">'+pillars.map(function(p){return '<div class="pillar"><div class="pillar-icon">'+p.icon+'</div><div class="pillar-title">'+p.title+'</div><div class="pillar-desc">'+p.desc+'</div></div>';}).join('')+'</div><div class="quick-label">'+(L==='fr'?'Questions fréquentes':'Quick questions')+'</div><div class="quick-grid">'+qs.map(function(qq){return '<button class="quick-btn" onclick="sendMessage(\''+qq.q.replace(/'/g,"\\'")+'\')">'+qq.label+'</button>';}).join('')+'</div></div>';}
function setLang(lang){currentLang=lang;updateLangUI();if(welcomeShown)document.getElementById('chat-area').innerHTML=renderWelcome();}
function updateLangUI(){var L=currentLang;document.getElementById('btn-fr').className='lang-btn'+(L==='fr'?' active':'');document.getElementById('btn-en').className='lang-btn'+(L==='en'?' active':'');document.getElementById('nav-sub').textContent=L==='fr'?'Consultant MAPAQ · HACCP · AICA':'MAPAQ · HACCP · AICA Consultant';document.getElementById('online-badge').textContent=L==='fr'?'● EN LIGNE':'● ONLINE';document.getElementById('input-field').placeholder=L==='fr'?'Posez votre question MAPAQ · HACCP · AICA...':'Ask your MAPAQ · HACCP · AICA question...';}
document.addEventListener('DOMContentLoaded',function(){document.getElementById('chat-area').innerHTML=renderWelcome();});
</script></body></html>
