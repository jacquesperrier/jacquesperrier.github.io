fr:"## 🌡️ Températures de sécurité\n\n**Zone de danger : 4°C à 60°C**\n\n### Réfrigération\n✅ Réfrigérateur : ≤ 4°C\n✅ Congélateur : ≤ -18°C\n⚠️ Enregistrer 2× par jour\n\n### Cuisson — températures internes\n🍗 Volaille entière : 82°C\n🍗 Volaille hachée : 74°C\n🥩 Bœuf/porc haché : 71°C\n🥩 Pièces entières : 63°C + 3 min\n🐟 Poisson : 70°C\n🥚 Œufs : 74°C\n🥘 Restes réchauffés : 74°C\n\n### Refroidissement rapide (CCP)\n⚠️ 60°C → 20°C en moins de 2h\n⚠️ 20°C → 4°C en moins de 4h\n\n### Actions correctives\n1. Isoler l'aliment\n2. Évaluer la durée hors zone\n3. Documenter la non-conformité\n4. Identifier et corriger la cause",
en:"## 🌡️ Food Safety Temperatures\n\n**Danger Zone: 4°C to 60°C**\n\n### Refrigeration\n✅ Refrigerator: ≤ 4°C\n✅ Freezer: ≤ -18°C\n⚠️ Log twice daily\n\n### Cooking Temperatures\n🍗 Whole poultry: 82°C\n🍗 Ground poultry: 74°C\n🥩 Ground beef/pork: 71°C\n🥩 Whole cuts: 63°C + 3 min rest\n🐟 Fish: 70°C\n🥚 Eggs: 74°C\n🥘 Reheated food: 74°C\n\n### Rapid Cooling (CCP)\n⚠️ 60°C → 20°C within 2 hours\n⚠️ 20°C → 4°C within 4 hours"},
{k:["inspection","inspecteur","préparer","prépar","visite","mapaq","audit","prepare","inspector"],
fr:"## 📋 Préparer une inspection MAPAQ\n\n### ÉTAPE 1 — Documents\n✅ Registres de températures à jour\n✅ Plan HACCP avec CCP documentés\n✅ Registre de nettoyage signé\n✅ Fiches de réception\n✅ Preuves de formation\n✅ Étiquetage conforme\n\n### ÉTAPE 2 — Zones physiques\n\n**Réfrigération**\n• Toutes les unités à ≤ 4°C?\n• Aliments couverts, étiquetés, datés?\n• Cru TOUJOURS en bas\n\n**Hygiène personnelle**\n• Stations de lavage : eau chaude + savon + papier\n• Uniformes propres, cheveux couverts\n• Employés malades exclus\n\n**Stockage**\n• FIFO respecté\n• Produits chimiques séparés\n• Aliments à ≥ 15 cm du sol\n\n### ÉTAPE 3 — Le jour J\n• Registres prêts et organisés\n• Accompagnez l'inspecteur\n• Demandez une copie du rapport",
en:"## 📋 Preparing for a MAPAQ Inspection\n\n### STEP 1 — Documents\n✅ Up-to-date temperature logs\n✅ HACCP plan with documented CCPs\n✅ Signed cleaning log\n✅ Receiving records\n✅ Training records\n✅ Compliant labeling\n\n### STEP 2 — Physical Zones\n\n**Refrigeration**\n• All units at ≤ 4°C?\n• Foods covered, labeled, dated?\n• Raw ALWAYS below cooked\n\n**Personal Hygiene**\n• Handwashing stations stocked\n• Clean uniforms, hair covered\n• Sick employees excluded\n\n**Storage**\n• FIFO respected\n• Chemicals separated\n• Food ≥ 15 cm off floor\n\n### STEP 3 — Day of Inspection\n• Records ready\n• Accompany the inspector\n• Request a copy of the report"},
{k:["haccp","ccp","point de contrôle","critique","principe","danger","limite","plan haccp","control point","hazard"],
fr:"## 🔍 HACCP — Les 7 Principes\n\n**Principe 1 — Analyse des dangers**\nBiologiques, chimiques et physiques.\n\n**Principe 2 — Identification des CCP**\nÉtapes où un danger peut être contrôlé.\n\n**Principe 3 — Limites critiques**\nEx. : 74°C pour la volaille hachée.\n\n**Principe 4 — Surveillance**\nQui? Comment? Fréquence? Tout documenté.\n\n**Principe 5 — Actions correctives**\nProlonger cuisson, jeter, isoler.\n\n**Principe 6 — Vérification**\nÉtalonnage, audits, analyses micro.\n\n**Principe 7 — Documentation**\nTout écrit. Minimum 1 an.\n\n### CCP typiques — Restaurant\n| CCP | Limite | Action |\n|---|---|---|\n| Réception | ≤ 4°C | Refuser |\n| Cuisson | 74°C | Prolonger |\n| Refroidissement | 60→20°C/2h | Jeter |\n| Réchauffage | 74°C/<2h | Jeter |",
en:"## 🔍 HACCP — 7 Principles\n\n**Principle 1 — Hazard Analysis**\nBiological, chemical and physical hazards.\n\n**Principle 2 — CCP Identification**\nSteps where a hazard can be controlled.\n\n**Principle 3 — Critical Limits**\nE.g.: 74°C for ground poultry.\n\n**Principle 4 — Monitoring**\nWho? How? How often? All documented.\n\n**Principle 5 — Corrective Actions**\nExtend cooking, discard, isolate.\n\n**Principle 6 — Verification**\nCalibration, audits, microbiological tests.\n\n**Principle 7 — Record Keeping**\nEverything written. Minimum 1 year.\n\n### Typical CCPs — Restaurant\n| CCP | Limit | Action |\n|---|---|---|\n| Receiving | ≤ 4°C | Reject |\n| Cooking | 74°C | Extend |\n| Cooling | 60→20°C/2h | Discard |\n| Reheating | 74°C/<2h | Discard |"},
{k:["aica","acia","cfia","fédéral","canadien","juridiction","federal","canadian"],
fr:"## 🍁 AICA, ACIA & MAPAQ\n\n### L'AICA\nAssociation des Inspecteurs en Aliments du Canada — représente les inspecteurs de l'ACIA.\n\n### MAPAQ vs ACIA\n| Aspect | MAPAQ | ACIA |\n|---|---|---|\n| Restaurants | Oui | Non |\n| Abattoirs provinciaux | Oui | Non |\n| Abattoirs fédéraux | Non | Oui |\n| Produits importés | Non | Oui |\n| Export interprovincial | Non | Oui |\n\n### Quand se conformer à l'ACIA?\n⚠️ Produit traverse les frontières provinciales\n⚠️ Importation d'aliments\n⚠️ Distribution nationale\n\nLe HACCP est reconnu par MAPAQ et ACIA.",
en:"## 🍁 AICA, CFIA & MAPAQ\n\n### AICA\nAssociation of Food Inspection Agents of Canada — represents CFIA inspectors.\n\n### MAPAQ vs CFIA\n| Aspect | MAPAQ | CFIA |\n|---|---|---|\n| Restaurants | Yes | No |\n| Provincial slaughterhouses | Yes | No |\n| Federal slaughterhouses | No | Yes |\n| Imported products | No | Yes |\n| Interprovincial export | No | Yes |\n\n### When to comply with CFIA?\n⚠️ Product crosses provincial borders\n⚠️ Importing food\n⚠️ National distribution"},
{k:["nettoyage","désinfect","sanit","propre","lavage","hygiène","clean","sanitiz","wash"],
fr:"## 🧹 Plan de nettoyage et désinfection\n\n### 4 étapes obligatoires\n1. Nettoyer — résidus visibles\n2. Rincer — retirer le détergent\n3. Désinfecter — désinfectant homologué\n4. Rincer final\n\n### Fréquences minimales\n• Après chaque usage : planches, couteaux, comptoirs\n• Toutes les 4h : surfaces en service continu\n• Quotidien : équipements, planchers, poubelles\n• Hebdomadaire : réfrigérateurs, hottes\n• Mensuel : plafonds, murs, joints\n\n### Concentration chlore\n✅ Sanitisation : 100–200 ppm\n✅ Désinfection renforcée : 200–400 ppm\n⚠️ Solution fraîche chaque jour",
en:"## 🧹 Cleaning and Sanitation Plan\n\n### 4 Mandatory Steps\n1. Clean — remove visible residues\n2. Rinse — remove detergent\n3. Sanitize — approved sanitizer\n4. Final rinse\n\n### Minimum Frequencies\n• After each use: boards, knives, counters\n• Every 4h: food contact surfaces\n• Daily: equipment, floors, bins\n• Weekly: refrigerators, hoods\n• Monthly: ceilings, walls, joints\n\n### Chlorine Concentration\n✅ Sanitizing: 100–200 ppm\n✅ Enhanced: 200–400 ppm\n⚠️ Fresh solution daily"},
