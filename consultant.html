0,0,0,.07)}.msg-bubble.assistant{background:#fff;color:var(--text);border-radius:12px 12px 12px 2px;border:1px solid var(--border)}.msg-bubble.user{background:var(--bordeaux);color:#fff;border-radius:12px 12px 2px 12px}.resp-h2{color:var(--bordeaux);font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:700;margin:.85rem 0 .3rem;border-bottom:1px solid #F0E4D4;padding-bottom:.2rem}.resp-h3{color:#5A2A10;font-weight:700;font-size:.85rem;margin:.6rem 0 .15rem}.resp-bold{font-weight:700;margin:.25rem 0;font-size:.85rem}.resp-line{margin:.12rem 0;font-size:.84rem;line-height:1.55}.resp-bullet{margin:.13rem 0;font-size:.84rem;padding-left:.5rem;line-height:1.5}.resp-table{font-size:.72rem;font-family:monospace;background:#F5F0E8;padding:.15rem .5rem;margin:.04rem 0;border-radius:3px;overflow-x:auto;white-space:nowrap;display:block}.resp-spacer{height:.3rem}.typing-dots{display:flex;gap:5px;align-items:center}.dot{width:7px;height:7px;border-radius:50%;background:var(--bordeaux);animation:bounce 1.2s ease infinite}.dot:nth-child(2){animation-delay:.22s}.dot:nth-child(3){animation-delay:.44s}@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}.input-bar{background:#fff;border-top:1px solid var(--border);padding:.65rem .9rem;flex-shrink:0}.input-inner{max-width:700px;margin:0 auto;display:flex;gap:.45rem;align-items:flex-end}.input-field{flex:1;border:1.5px solid #D8CABB;border-radius:10px;padding:.6rem .8rem;font-size:.87rem;font-family:'Source Sans 3',sans-serif;resize:none;outline:none;line-height:1.5;color:var(--text);background:#FAFAF7;transition:border-color .2s;min-height:44px;max-height:120px}.input-field:focus{border-color:var(--bordeaux)}.send-btn{width:42px;height:42px;flex-shrink:0;border:none;border-radius:10px;background:var(--bordeaux);color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 2px 8px rgba(139,26,26,.35)}.send-btn:disabled{background:#CDBFB0;box-shadow:none;cursor:not-allowed}.input-footer{text-align:center;font-size:.62rem;color:#BBB;margin-top:.3rem}.input-footer a{color:#BBB;text-decoration:none}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#D4C4B0;border-radius:4px}</style></head><body><div class="page-wrapper"><nav class="topnav"><a class="topnav-brand" href="https://verdict360ai.com"><div class="topnav-logo">V</div><div><div class="topnav-title">VERDICT 360 AI</div><div class="topnav-sub" id="nav-sub">Consultant MAPAQ · HACCP · AICA</div></div></a><div class="topnav-right"><div class="lang-toggle"><button class="lang-btn active" id="btn-fr" onclick="setLang('fr')">FR</button><button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button></div><div class="online-badge" id="online-badge">● EN LIGNE</div></div></nav><div class="chat-area" id="chat-area"></div><div class="input-bar"><div class="input-inner"><textarea class="input-field" id="input-field" rows="1" placeholder="Posez votre question MAPAQ · HACCP · AICA..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea><button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>➤</button></div><div class="input-footer"><a href="https://verdict360ai.com">verdict360ai.com</a> · <a href="tel:+18738221455">+1 (873) 822-1455</a> · <a href="mailto:info@verdict360ai.com">info@verdict360ai.com</a></div></div></div>

var KB=[{kw_fr:["température","temp","froid","chaud","réfrigér","congel","cuisson","danger","zone","réchauff"],kw_en:["temperature","temp","cold","hot","refriger","freez","cooking","danger","zone","reheat"],fr:`## 🌡️ Températures de sécurité\n\n**Zone de danger : 4°C à 60°C**\n\n### Réfrigération\n✅ Réfrigérateur : ≤ 4°C\n✅ Congélateur : ≤ -18°C\n⚠️ Enregistrer 2× par jour\n\n### Cuisson (températures internes)\n🍗 Volaille entière : 82°C\n🍗 Volaille hachée : 74°C\n🥩 Bœuf/porc haché : 71°C\n🥩 Pièces entières : 63°C + 3 min\n🐟 Poisson : 70°C\n🥚 Œufs : 74°C\n🥘 Restes réchauffés : 74°C\n\n### Refroidissement rapide (CCP)\n⚠️ 60°C → 20°C en moins de 2h\n⚠️ 20°C → 4°C en moins de 4h\n\n### Actions correctives\n1. Isoler l'aliment\n2. Évaluer durée hors zone\n3. Documenter la non-conformité\n4. Identifier la cause`,en:`## 🌡️ Food Safety Temperatures\n\n**Danger Zone: 4°C to 60°C**\n\n### Refrigeration\n✅ Refrigerator: ≤ 4°C\n✅ Freezer: ≤ -18°C\n\n### Cooking Temperatures\n🍗 Whole poultry: 82°C\n🍗 Ground poultry: 74°C\n🥩 Ground beef/pork: 71°C\n🥩 Whole cuts: 63°C + 3 min rest\n🐟 Fish: 70°C\n🥚 Eggs: 74°C\n🥘 Reheated food: 74°C\n\n### Rapid Cooling (CCP)\n⚠️ 60°C → 20°C within 2 hours\n⚠️ 20°C → 4°C within 4 hours`},{kw_fr:["inspection","inspecteur","préparer","préparation","visite","mapaq","audit"],kw_en:["inspection","inspector","prepare","preparation","visit","audit","check"],fr:`## 📋 Préparer une inspection MAPAQ\n\n### ÉTAPE 1 — Documents\n✅ Registres de températures à jour\n✅ Plan HACCP avec CCP documentés\n✅ Registre de nettoyage signé\n✅ Fiches de réception des marchandises\n✅ Preuves de formation du personnel\n✅ Étiquetage conforme\n\n### ÉTAPE 2 — Zones physiques\n\n**Réfrigération**\n• Toutes les unités à ≤ 4°C?\n• Aliments couverts, étiquetés, datés?\n• Cru TOUJOURS en bas\n\n**Hygiène personnelle**\n• Stations de lavage : eau chaude + savon + papier\n• Uniformes propres, cheveux couverts\n• Employés malades exclus\n\n**Stockage**\n• FIFO respecté\n• Produits chimiques séparés des aliments\n• Aliments à ≥ 15 cm du sol\n\n### ÉTAPE 3 — Le jour J\n• Registres prêts et organisés\n• Accompagnez l'inspecteur\n• Demandez une copie du rapport`,en:`## 📋 Preparing for a MAPAQ Inspection\n\n### STEP 1 — Documents\n✅ Up-to-date temperature logs\n✅ HACCP plan with documented CCPs\n✅ Signed cleaning log\n✅ Goods receiving records\n✅ Staff training records\n✅ Compliant labeling\n\n### STEP 2 — Physical Zones\n\n**Refrigeration**\n• All units at ≤ 4°C?\n• Foods covered, labeled, dated?\n• Raw ALWAYS below cooked\n\n**Personal Hygiene**\n• Handwashing stations stocked\n• Clean uniforms, hair covered\n• Sick employees excluded\n\n**Storage**\n• FIFO respected\n• Chemicals separated from food\n• Food ≥ 15 cm off floor\n\n### STEP 3 — Day of Inspection\n• Records ready and organized\n• Accompany the inspector\n• Request a copy of the report`},{kw_fr:["haccp","ccp","point de contrôle","critique","principe","danger","limite","plan haccp"],kw_en:["haccp","ccp","control point","critical","principle","hazard","limit","haccp plan"],fr:`## 🔍 Système HACCP — 7 Principes\n\n**Principe 1 — Analyse des dangers**\nIdentifier dangers biologiques, chimiques et physiques.\n\n**Principe 2 — Identification des CCP**\nÉtapes où un danger peut être éliminé ou contrôlé.\n\n**Principe 3 — Limites critiques**\nEx. : 74°C pour la volaille hachée.\n\n**Principe 4 — Surveillance**\nQui? Comment? À quelle fréquence? Tout documenté.\n\n**Principe 5 — Actions correctives**\nProlonger cuisson, jeter, isoler le lot.\n\n**Principe 6 — Vérification**\nÉtalonnage, audits internes, analyses micro.\n\n**Principe 7 — Documentation**\nTout écrit. Minimum 1 an d'archives.\n\n### CCP typiques — Restaurant\n| CCP | Limite | Action |\n|---|---|---|\n| Réception | ≤ 4°C | Refuser |\n| Cuisson | 74°C volaille | Prolonger |\n| Refroidissement | 60→20°C/2h | Jeter |\n| Réchauffage | 74°C/<2h | Jeter |`,en:`## 🔍 HACCP System — 7 Principles\n\n**Principle 1 — Hazard Analysis**\nIdentify biological, chemical and physical hazards.\n\n**Principle 2 — CCP Identification**\nSteps where a hazard can be eliminated or controlled.\n\n**Principle 3 — Critical Limits**\nE.g.: 74°C for ground poultry.\n\n**Principle 4 — Monitoring**\nWho? How? How often? All documented.\n\n**Principle 5 — Corrective Actions**\nExtend cooking, discard, isolate batch.\n\n**Principle 6 — Verification**\nCalibration, internal audits, microbiological testing.\n\n**Principle 7 — Record Keeping**\nEverything written. Minimum 1 year of records.\n\n### Typical CCPs — Restaurant\n| CCP | Limit | Action |\n|---|---|---|\n| Receiving | ≤ 4°C | Reject |\n| Cooking | 74°C poultry | Extend |\n| Cooling | 60→20°C/2h | Discard |\n| Reheating | 74°C/<2h | Discard |`},{kw_fr:["aica","acia","fédéral","canadien","inspection canada","juridiction"],kw_en:["aica","cfia","federal","canadian","inspection canada","jurisdiction"],fr:`## 🍁 AICA, ACIA & MAPAQ\n\n### L'AICA\nAssociation des Inspecteurs en Aliments du Canada — représente les inspecteurs de l'ACIA.\n\n### MAPAQ vs ACIA\n| Aspect | MAPAQ | ACIA |\n|---|---|---|\n| Restaurants | ✅ | ❌ |\n| Abattoirs provinciaux | ✅ | ❌ |\n| Abattoirs fédéraux | ❌ | ✅ |\n| Produits importés | ❌ | ✅ |\n| Export interprovincial | ❌ | ✅ |\n\n### Quand se conformer à l'ACIA?\n⚠️ Produit traverse les frontières provinciales\n⚠️ Importation d'aliments\n⚠️ Distribution nationale`,en:`## 🍁 AICA, CFIA & MAPAQ\n\n### AICA\nAssociation of Food Inspection Agents of Canada — represents CFIA inspectors.\n\n### MAPAQ vs CFIA\n| Aspect | MAPAQ | CFIA |\n|---|---|---|\n| Restaurants | ✅ | ❌ |\n| Provincial slaughterhouses | ✅ | ❌ |\n| Federal slaughterhouses | ❌ | ✅ |\n| Imported products | ❌ | ✅ |\n| Interprovincial export | ❌ | ✅ |\n\n### When to comply with CFIA?\n⚠️ Product crosses provincial borders\n⚠️ Importing food\n⚠️ National distribution`},{kw_fr:["nettoyage","désinfect","sanit","propre","lavage","hygiène"],kw_en:["cleaning","sanitiz","disinfect","clean","washing","hygiene"],fr:`## 🧹 Plan de nettoyage et désinfection\n\n### 4 étapes obligatoires\n1. Nettoyer — résidus visibles\n2. Rincer — retirer le détergent\n3. Désinfecter — désinfectant homologué\n4. Rincer final\n\n### Fréquences minimales\n• Après chaque usage : planches, couteaux, comptoirs\n• Toutes les 4h : surfaces en service continu\n• Quotidien : équipements, planchers, poubelles\n• Hebdomadaire : réfrigérateurs, hottes\n• Mensuel : plafonds, murs, joints\n\n### Concentration chlore\n✅ Sanitisation : 100–200 ppm\n✅ Désinfection renforcée : 200–400 ppm\n⚠️ Vérifier avec bandelettes — noter dans le registre`,en:`## 🧹 Cleaning and Sanitation Plan\n\n### 4 Mandatory Steps\n1. Clean — remove visible residues\n2. Rinse — remove detergent\n3. Sanitize — approved sanitizer\n4. Final rinse\n\n### Minimum Frequencies\n• After each use: boards, knives, counters\n• Every 4h: food contact surfaces\n• Daily: equipment, floors, bins\n• Weekly: refrigerators, hoods\n• Monthly: ceilings, walls, joints\n\n### Chlorine Concentration\n✅ Sanitizing: 100–200 ppm\n✅ Enhanced: 200–400 ppm\n⚠️ Test with strips — log in records`},{kw_fr:["non-conformit","infraction","problème","fréquent","erreur"],kw_en:["non-conformit","violation","problem","frequent","error","deficiency"],fr:`## ⚠️ Non-conformités fréquentes\n\n### 🔴 CRITIQUES\n1. Températures hors norme\n2. Contamination croisée\n3. Hygiène personnelle déficiente\n4. Infestation active\n5. Produits impropres\n\n### 🟠 MAJEURES (24–48h)\n6. Registres absents ou incomplets\n7. Plan HACCP inexistant\n8. Formation non documentée\n9. Étiquetage déficient\n10. Produits chimiques mal séparés\n\n### 🟡 MINEURES\n11. FIFO non respecté\n12. Aliments non couverts\n13. Équipements en mauvais état\n14. Éclairage insuffisant\n\n### Protocole de réponse\n1. ✅ Corriger immédiatement\n2. ✅ Documenter\n3. ✅ Identifier la cause\n4. ✅ Mesure préventive`,en:`## ⚠️ Common Non-Conformities\n\n### 🔴 CRITICAL\n1. Out-of-range temperatures\n2. Cross-contamination\n3. Poor personal hygiene\n4. Active infestation\n5. Unfit products\n\n### 🟠 MAJOR (24–48h)\n6. Absent or incomplete records\n7. No HACCP plan\n8. Undocumented training\n9. Deficient labeling\n10. Poor chemical separation\n\n### 🟡 MINOR\n11. FIFO not respected\n12. Uncovered food\n13. Equipment in poor condition\n14. Insufficient lighting\n\n### Response Protocol\n1. ✅ Correct immediately\n2. ✅ Document\n3. ✅ Identify root cause\n4. ✅ Preventive measure`},{kw_fr:["document","registre","formulaire","requis","obligatoire","avoir","archive"],kw_en:["document","record","form","required","mandatory","need","archive"],fr:`## 📝 Documents obligatoires\n\n### Documents HACCP\n✅ Plan HACCP écrit\n✅ Analyse des dangers\n✅ Tableau des CCP\n✅ Procédures de vérification\n✅ Minimum 1 an d'archives\n\n### Registres quotidiens\n📋 Températures (2× /jour)\n📋 Températures de cuisson\n📋 Refroidissement\n📋 Réception des marchandises\n📋 Nettoyage et désinfection\n📋 Non-conformités\n\n### RH\n👥 Certificats de formation hygiène\n👥 Registre de santé et exclusions\n\n### Conservation\n• Registres actifs : accessibles en tout temps\n• Archives : minimum 1 an\n• Plan HACCP : réviser annuellement`,en:`## 📝 Mandatory Documents\n\n### HACCP Documents\n✅ Written HACCP plan\n✅ Hazard analysis\n✅ CCP table\n✅ Verification procedures\n✅ Minimum 1 year records\n\n### Daily Records\n📋 Temperatures (2× daily)\n📋 Cooking temperatures\n📋 Cooling log\n📋 Goods receiving\n📋 Cleaning and sanitation\n📋 Non-conformities\n\n### HR\n👥 Food hygiene certificates\n👥 Health and exclusion records\n\n### Retention\n• Active records: always accessible\n• Archives: minimum 1 year\n• HACCP plan: review annually`},{kw_fr:["allergen","allerg","gluten","arachide","noix","lait","œuf","soja"],kw_en:["allergen","allerg","gluten","peanut","nut","milk","egg","soy"],fr:`## 🚨 Gestion des allergènes\n\n### 14 allergènes prioritaires (Canada)\n1. Arachides\n2. Noix\n3. Graines de sésame\n4. Lait\n5. Œufs\n6. Poisson\n7. Crustacés et mollusques\n8. Blé/triticale (gluten)\n9. Soja\n10. Moutarde\n11. Sulfites ≥ 10 ppm\n\n### Étiquetage\n✅ Allergènes en GRAS\n✅ Ou déclaration : "Contient : lait, œufs"\n\n### Prévention croisée\n• Ustensiles dédiés par allergène\n• Nettoyage validé entre préparations\n• Formation du personnel\n• Protocole commandes sans allergènes`,en:`## 🚨 Allergen Management\n\n### 14 Priority Allergens (Canada)\n1. Peanuts\n2. Tree nuts\n3. Sesame seeds\n4. Milk\n5. Eggs\n6. Fish\n7. Crustaceans and mollusks\n8. Wheat/triticale (gluten)\n9. Soy\n10. Mustard\n11. Sulfites ≥ 10 ppm\n\n### Labeling\n✅ Allergens in BOLD\n✅ Or declaration: "Contains: milk, eggs"\n\n### Cross-Contamination\n• Dedicated utensils per allergen\n• Validated cleaning between preparations\n• Staff training\n• Protocol for allergen-free orders`}];
</script>
