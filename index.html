<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verdict Inspection AI</title>

<style>
body{
font-family:Arial;
padding:20px;
background:#f4f4f4;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
}

button{
background:black;
color:white;
border:none;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<h2>Verdict Inspection AI</h2>

<!-- LOGIN PIN -->

<div id="login">

<input id="pin" placeholder="Entrer votre PIN">

<button onclick="login()">Connexion</button>

<p id="message" style="color:red;"></p>

</div>

<!-- MENU -->

<div id="menu" class="hidden">

<select id="type">

<option value="Temperatures">Température</option>

<option value="Nettoyage">Nettoyage</option>

<option value="Heures_Regulier">Heures</option>

</select>

<input id="nom" placeholder="Nom employé">

<input id="equipement" placeholder="Équipement / Zone">

<input id="valeur" placeholder="Valeur">

<button onclick="envoyer()">Envoyer</button>

</div>

<script>

/* PIN autorisés */

const PIN = {

"1234":"Jacques",

"5678":"Marie"

};

/* URL Apps Script */

const API_URL="https://script.google.com/macros/s/AKfycbxsxir81EyPm8wEC-MR7gEo_MImY6LHhG72O6Cqz-IHvIcroXTGwVEyvkz2tORq0Xa7/exec";

/* LOGIN */

function login(){

let pin=document.getElementById("pin").value.trim();

if(PIN[pin]){

document.getElementById("login").classList.add("hidden");

document.getElementById("menu").classList.remove("hidden");

document.getElementById("nom").value=PIN[pin];

}

else{

document.getElementById("message").innerText="PIN invalide";

}

}

/* ENVOI DONNÉE */

function envoyer(){

let type=document.getElementById("type").value;

let nom=document.getElementById("nom").value.trim();

let equipement=document.getElementById("equipement").value.trim();

let valeur=document.getElementById("valeur").value.trim();

if(!nom||!equipement||!valeur){

alert("Remplir tous les champs");

return;

}

let data={

type:type,

nom:nom,

equipement:equipement,

valeur:valeur

};

fetch(API_URL,{

method:"POST",

body:JSON.stringify(data)

})

.then(res=>res.json())

.then(res=>{

if(res.status==="success"){

alert("Donnée envoyée");

document.getElementById("equipement").value="";

document.getElementById("valeur").value="";

}

else{

alert("Erreur serveur");

}

})

.catch(()=>alert("Erreur réseau"));

}

</script>

</body>
</html>
