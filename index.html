<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspection Mobile</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
input, select, button { width:100%; padding:12px; margin-top:10px; font-size:16px; }
button { background:black; color:white; border:none; cursor:pointer; }
</style>
</head>
<body>

<h2>Inspection Mobile</h2>

<input id="nom" placeholder="Nom employé">

<select id="equipement">
  <option>Frigo 1</option>
  <option>Frigo 2</option>
  <option>Congélateur</option>
  <option>Autre</option>
</select>

<input id="valeur" placeholder="Température">

<button onclick="envoyer()">Envoyer</button>

<script>
// === URL Apps Script fournie ===
const API_URL = "https://script.google.com/macros/s/AKfycbxsxir81EyPm8wEC-MR7gEo_MImY6LHhG72O6Cqz-IHvIcroXTGwVEyvkz2tORq0Xa7/exec";

function envoyer(){
  const nom = document.getElementById("nom").value.trim();
  const equipement = document.getElementById("equipement").value;
  const valeur = document.getElementById("valeur").value.trim();

  if (!nom || !valeur) {
    alert("Veuillez remplir tous les champs.");
    return;
  }

  const data = {
    type: "Temperatures",
    nom: nom,
    equipement: equipement,
    valeur: valeur
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    if (res.status === "success") {
      alert("✅ Donnée envoyée !");
      document.getElementById("valeur").value = "";
    } else {
      alert("❌ Erreur serveur : " + res.message);
    }
  })
  .catch(err => alert("❌ Erreur réseau : " + err));
}
</script>

</body>
</html>
