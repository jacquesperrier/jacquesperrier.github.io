<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Verdict Inspection AI – Rapport Expert</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* --- STYLE CSS --- */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --noir: #0a0c0f; --blanc: #f5f3ef; --or: #c9a84c; --gris: #8a8a8a; --rouge: #e74c3c; --vert: #2ecc71; --jaune: #f1c40f; }
  html, body { background: var(--noir); color: var(--blanc); font-family: 'Montserrat', sans-serif; }
  .page { max-width: 430px; margin: 0 auto; padding-bottom: 50px; position: relative; }
  .gold-line { position: absolute; left: 28px; top: 0; bottom: 0; width: 1px; background: linear-gradient(to bottom, transparent, var(--or), transparent); opacity: 0.3; }
  .header { padding: 40px 32px 20px 52px; }
  .logo-v { font-family: 'Cormorant Garamond', serif; font-size: 50px; color: var(--blanc); }
  .logo-v span { color: var(--or); }
  
  /* Score Ring */
  .score-section { padding: 20px 32px 20px 52px; display: flex; align-items: center; gap: 20px; }
  .score-ring { position: relative; width: 100px; height: 100px; }
  .score-ring svg { transform: rotate(-90deg); width: 100px; height: 100px; }
  circle { fill: none; stroke-width: 6; }
  .bg { stroke: rgba(255,255,255,0.1); }
  .fill { stroke: var(--vert); stroke-dasharray: 283; stroke-dashoffset: 283; transition: 1.5s; }
  .score-number { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 30px; }

  /* Analyse Zone */
  .zones-section { padding: 20px 32px 20px 52px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 4px; border-left: 3px solid var(--or); }
  .card h4 { font-size: 10px; text-transform: uppercase; color: var(--gris); margin-bottom: 5px; }
  .card .val { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--or); }

  /* Recommandations IA (Le plus important pour toi) */
  .ia-section { margin: 20px 32px 20px 52px; background: rgba(201,168,76,0.05); border: 1px solid rgba(201,168,76,0.2); padding: 20px; border-radius: 8px; }
  .ia-title { font-size: 10px; letter-spacing: 2px; color: var(--or); margin-bottom: 15px; font-weight: bold; }
  .ia-item { font-size: 11px; line-height: 1.6; margin-bottom: 10px; display: flex; gap: 10px; }
  .ia-item span { color: var(--or); }
</style>
</head>
<body>

<div class="page">
  <div class="gold-line"></div>
  
  <div class="header">
    <div class="logo-v"><span>V</span>erdict</div>
    <p style="font-size:10px; color:var(--gris); letter-spacing:2px;">RAPPORT D'INSPECTION IA</p>
  </div>

  <div class="score-section">
    <div class="score-ring">
      <svg><circle class="bg" cx="50" cy="50" r="45"/><circle id="ring" class="fill" cx="50" cy="50" r="45"/></svg>
      <div class="score-number" id="main-score">0%</div>
    </div>
    <div>
      <div id="status-label" style="font-family:'Cormorant Garamond'; font-size:24px;">ANALYSE...</div>
      <div id="client-name" style="font-size:12px; color:var(--gris);">Client</div>
    </div>
  </div>

  <div class="zones-section">
    <div class="grid">
      <div class="card"><h4>Température</h4><div class="val" id="val-temp">0%</div></div>
      <div class="card"><h4>Nettoyage</h4><div class="val" id="val-net">0%</div></div>
    </div>
  </div>

  <div class="ia-section">
    <div class="ia-title">✨ RECOMMANDATIONS DE L'IA</div>
    <div id="ia-list">
      </div>
  </div>
</div>

<script>
  // RÉCUPÉRATION DES PARAMÈTRES DANS LE LIEN
  const p = new URLSearchParams(window.location.search);
  const nom = p.get('nom') || "Établissement";
  const t = parseInt(p.get('t')) || 100; // t = température
  const n = parseInt(p.get('n')) || 100; // n = nettoyage
  const global = Math.round((t + n) / 2);

  // Mise à jour visuelle
  document.getElementById('client-name').innerText = nom;
  document.getElementById('val-temp').innerText = t + "%";
  document.getElementById('val-net').innerText = n + "%";
  document.getElementById('main-score').innerText = global + "%";
  
  // Animation cercle
  const ring = document.getElementById('ring');
  ring.style.strokeDashoffset = 283 - (283 * global / 100);

  // LOGIQUE DE RECOMMANDATION IA
  const list = document.getElementById('ia-list');
  let html = "";

  if(t < 100) {
    html += `<div class="ia-item"><span>⚠</span> <b>Températures (${t}%) :</b> Il manque ${100-t}% de vos vérifications. Risque de non-conformité MAPAQ élevé.</div>`;
  }
  if(n < 100) {
    html += `<div class="ia-item"><span>⚠</span> <b>Nettoyage (${n}%) :</b> Fréquence insuffisante. ${100-n}% des tâches critiques n'ont pas été signées cette semaine.</div>`;
  }
  if(global >= 95) {
    html += `<div class="ia-item"><span>✅</span> <b>Excellent :</b> Votre établissement respecte les standards les plus élevés.</div>`;
  }

  list.innerHTML = html || "<div class='ia-item'>Aucune anomalie détectée.</div>";

  // Label de statut
  const label = document.getElementById('status-label');
  if(global < 70) { label.innerText = "CRITIQUE"; label.style.color = "#e74c3c"; }
  else if(global < 90) { label.innerText = "À AMÉLIORER"; label.style.color = "#f1c40f"; }
  else { label.innerText = "CONFORME"; label.style.color = "#2ecc71"; }

</script>
</body>
</html>
