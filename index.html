<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Verdict Inspection AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --or: #C9A84C; --noir: #080809; --card: #111214;
            --blanc: #F0EBE0; --gris: #555A64; --gris2: #8A8E98;
            --vert: #22C55E; --rouge: #EF4444; --border: rgba(255,255,255,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--noir); color: var(--blanc); font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden; }
        
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--noir); transition: transform 0.3s ease, opacity 0.3s ease; z-index: 10; padding: 25px; }
        .screen.hidden { transform: translateY(30px); opacity: 0; pointer-events: none; }
        
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 70px; font-weight: 300; margin-bottom: 5px; }
        .logo span { color: var(--or); font-weight: 600; }
        .tagline { font-size: 9px; letter-spacing: 6px; color: var(--gris2); margin-bottom: 40px; }
        
        .btn-main { border: 2px solid var(--or); color: var(--or); background: transparent; padding: 18px 45px; border-radius: 50px; font-weight: 700; letter-spacing: 4px; cursor: pointer; font-size: 11px; }
        
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 280px; }
        .key { background: #1A1C20; border: 1px solid var(--border); padding: 22px; text-align: center; border-radius: 12px; font-size: 24px; color: var(--blanc); cursor: pointer; transition: 0.1s; }
        .key:active { background: var(--or); color: var(--noir); }

        .form-header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-top: 10px; }
        .field-group { width: 100%; margin-bottom: 18px; text-align: left; }
        .field-label { font-size: 9px; color: var(--or); letter-spacing: 2px; margin-bottom: 8px; display: block; font-weight: 700; }
        .field-input, .field-select { width: 100%; background: var(--card); border: 1px solid var(--border); padding: 14px; color: white; border-radius: 10px; font-size: 14px; outline: none; }
        
        .pill-menu { border: 1px solid var(--border); padding: 25px 15px; border-radius: 15px; text-align: center; cursor: pointer; background: var(--card); transition: 0.2s; }
        .pill-menu:active { border-color: var(--or); transform: scale(0.96); }
        .icon-lg { font-size: 30px; margin-bottom: 10px; display: block; }

        .spinner { width: 22px; height: 22px; border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--or); border-radius: 50%; animation: spin 0.8s linear infinite; margin: auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="screen" id="splash">
        <div class="logo"><span>V</span>erdict</div>
        <div class="tagline">INSPECTION AI · EXPERT</div>
        <button class="btn-main" onclick="showScreen('pin')">ACCÉDER AU TERMINAL</button>
    </div>

    <div class="screen hidden" id="pin">
        <div style="font-size:11px; letter-spacing:4px; color:var(--gris2); margin-bottom:20px;">IDENTIFICATION</div>
        <div id="pin-display" style="font-size:35px; letter-spacing:15px; margin-bottom:40px; color:var(--or);">____</div>
        <div class="keypad">
            <div class="key" onclick="pinPress(1)">1</div><div class="key" onclick="pinPress(2)">2</div><div class="key" onclick="pinPress(3)">3</div>
            <div class="key" onclick="pinPress(4)">4</div><div class="key" onclick="pinPress(5)">5</div><div class="key" onclick="pinPress(6)">6</div>
            <div class="key" onclick="pinPress(7)">7</div><div class="key" onclick="pinPress(8)">8</div><div class="key" onclick="pinPress(9)">9</div>
            <div class="key" style="color:var(--rouge)" onclick="pinClear()">C</div><div class="key" onclick="pinPress(0)">0</div><div class="key" style="color:var(--vert)" onclick="pinConfirm()">OK</div>
        </div>
    </div>

    <div class="screen hidden" id="menu">
        <div id="greeting" style="font-family:'Cormorant Garamond'; font-size:32px; color:var(--or); margin-bottom:40px;"></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; width:100%; max-width:400px;">
            <div class="pill-menu" onclick="showForm('heures')"><span class="icon-lg">⏰</span><div style="font-size:10px; letter-spacing:2px;">HEURES</div></div>
            <div class="pill-menu" onclick="showForm('temperatures')"><span class="icon-lg">🌡️</span><div style="font-size:10px; letter-spacing:2px;">TEMP.</div></div>
            <div class="pill-menu" onclick="showForm('nettoyage')"><span class="icon-lg">🧹</span><div style="font-size:10px; letter-spacing:2px;">NETTOYAGE</div></div>
            <div class="pill-menu" onclick="showForm('reception')"><span class="icon-lg">📦</span><div style="font-size:10px; letter-spacing:2px;">RÉCEPTION</div></div>
        </div>
        <button onclick="showScreen('splash')" style="margin-top:60px; background:none; border:none; color:var(--gris); font-size:10px; letter-spacing:3px;">DÉCONNEXION</button>
    </div>

    <div class="screen hidden" id="form-container" style="justify-content: flex-start; overflow-y: auto;">
        <div class="form-header">
            <button onclick="showScreen('menu')" style="background:none; border:none; color:var(--gris2); font-size:24px;">✕</button>
            <div id="form-title" style="font-size:11px; letter-spacing:4px; font-weight:700; color:var(--or);">SAISIE</div>
            <div style="width:24px;"></div>
        </div>
        <div id="form-fields" style="width:100%; max-width:400px;"></div>
        <button id="submit-btn" class="btn-main" style="width:100%; margin-top:30px;" onclick="submitCurrentForm()">ENREGISTRER LES DONNÉES</button>
    </div>

    <div class="screen hidden" id="confirmation">
        <div style="font-size:70px; margin-bottom:20px;">✅</div>
        <div style="color:var(--vert); font-family:'Cormorant Garamond'; font-size:32px; margin-bottom:10px;">Enregistré</div>
        <div style="font-size:10px; color:var(--gris2); letter-spacing:2px;">TRANSMISSION RÉUSSIE</div>
        <button class="btn-main" style="margin-top:40px;" onclick="showScreen('menu')">RETOUR AU MENU</button>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbybbLZgW3VSzK7YpkBnF2UMmhZKjPOP52duhC0adPa7OjurCMdgQW3gHhb8fScFFskG/exec';
        const EMPLOYES = { '1111': 'Jacques', '1234': 'Marie', '2222': 'Jean', '3333': 'Sophie', '0000': 'Admin' };
        
        let currentPin = '';
        let currentUser = '';
        let currentType = '';

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            const target = document.getElementById(id);
            target.classList.remove('hidden');
            target.scrollTop = 0;
        }

        function pinPress(n) { if(currentPin.length < 4) { currentPin += n; document.getElementById('pin-display').innerText = '*'.repeat(currentPin.length).padEnd(4, '_'); } }
        function pinClear() { currentPin = ''; document.getElementById('pin-display').innerText = '____'; }

        function pinConfirm() {
            const nom = EMPLOYES[currentPin];
            if(nom) {
                currentUser = nom;
                document.getElementById('greeting').innerText = "Bonjour " + nom;
                showScreen('menu');
                pinClear();
            } else {
                pinClear();
                alert("Code erroné");
            }
        }

        function showForm(type) {
            currentType = type;
            const container = document.getElementById('form-fields');
            const title = document.getElementById('form-title');
            container.innerHTML = '';
            title.innerText = type.toUpperCase();

            let fields = `<div class="field-group"><label class="field-label">RESPONSABLE</label><input class="field-input" id="f-employe" value="${currentUser}" readonly></div>`;
            
            if(type === 'heures') {
                fields += `<div class="field-group"><label class="field-label">TYPE D'ACTION</label><select class="field-select" id="f-action"><option>ARRIVÉE</option><option>DÉPART</option></select></div>`;
                fields += `<div class="field-group"><label class="field-label">QUART</label><select class="field-select" id="f-quart"><option>Jour</option><option>Soir</option></select></div>`;
            } else if(type === 'temperatures') {
                fields += `<div class="field-group"><label class="field-label">ÉQUIPEMENT</label><select class="field-select" id="f-equip"><option>Frigo Cuisine</option><option>Frigo Bar</option><option>Congélateur</option><option>Bain-Marie</option></select></div>`;
                fields += `<div class="field-group"><label class="field-label">TEMPÉRATURE (°C)</label><input type="number" step="0.1" class="field-input" id="f-val" placeholder="ex: 3.5"></div>`;
            } else if(type === 'nettoyage') {
                fields += `<div class="field-group"><label class="field-label">ZONE EFFECTUÉE</label><select class="field-select" id="f-zone"><option>Cuisine</option><option>Salle</option><option>Sanitaires</option><option>Plonge</option></select></div>`;
            } else if(type === 'reception') {
                fields += `<div class="field-group"><label class="field-label">FOURNISSEUR</label><input class="field-input" id="f-fourn" placeholder="Nom du fournisseur"></div>`;
                fields += `<div class="field-group"><label class="field-label">CONFORMITÉ</label><select class="field-select" id="f-statut"><option>CONFORME</option><option>REFUSÉ</option></select></div>`;
            }

            fields += `<div class="field-group"><label class="field-label">OBSERVATIONS / NOTES</label><input class="field-input" id="f-notes" placeholder="..."></div>`;
            container.innerHTML = fields;
            showScreen('form-container');
        }

        async function submitCurrentForm() {
            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<div class="spinner"></div>';
            btn.disabled = true;
            
            const data = {
                type: currentType,
                employe: currentUser,
                date: new Date().toLocaleDateString('fr-CA'),
                heure: new Date().toLocaleTimeString('fr-CA', {hour: '2-digit', minute:'2-digit'}),
                notes: document.getElementById('f-notes').value
            };

            if(document.getElementById('f-action')) data.action = document.getElementById('f-action').value;
            if(document.getElementById('f-quart')) data.quart = document.getElementById('f-quart').value;
            if(document.getElementById('f-equip')) data.equipement = document.getElementById('f-equip').value;
            if(document.getElementById('f-val')) data.valeur = document.getElementById('f-val').value;
            if(document.getElementById('f-zone')) data.zone = document.getElementById('f-zone').value;
            if(document.getElementById('f-fourn')) data.fournisseur = document.getElementById('f-fourn').value;
            if(document.getElementById('f-statut')) data.statut = document.getElementById('f-statut').value;

            try {
                const params = new URLSearchParams();
                params.append('data', JSON.stringify(data));
                
                await fetch(APPS_SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params 
                });
                
                showScreen('confirmation');
            } catch(e) {
                alert("Erreur de transmission. Vérifiez votre connexion.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
