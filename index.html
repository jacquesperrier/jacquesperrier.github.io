<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verdict Inspection AI</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
input, select, button { width:100%; padding:12px; margin-top:10px; font-size:16px; }
button { background:black; color:white; border:none; cursor:pointer; }
.hidden { display:none; }
</style>
</head>
<body>

<h2>Verdict Inspection AI</h2>

<div id="login">
  <input id="pin" placeholder="Entrer PIN">
  <button onclick="validerPIN()">Valider PIN</button>
  <p id="loginMessage" style="color:red;"></p>
</div>

<div id="menu" class="hidden">
  <select id="type">
    <option value="Temperatures">Températures</option>
    <option value="Nettoyage">Nettoyage</option>
    <option value="Heures_Regulier">Heures</option>
  </select>
  <input id="nom" placeholder="Nom employé">
  <input id="equipement" placeholder="Équipement / Zone">
  <input id="valeur" placeholder="Valeur / Heure">
  <button onclick="envoyer()">Envoyer</button>
</div>

<script>
// === Config PIN existants ===
const PIN_LIST = {
  "1234": "Jacques",
  "5678": "Marie"
};

// === URL Apps Script ===
const API_URL = "https://script.google.com/macros/s/AKfycbxsxir81EyPm8wEC-MR7gEo_MImY6LHhG72O6Cqz-IHvIcroXTGwVEyvkz2tORq0Xa7/exec";

// Validation PIN
function validerPIN(){
  const pin = document.getElementById("pin").value.trim();
  const loginMessage = document.getElementById("loginMessage");
  if(PIN_LIST[pin]){
    document.getElementById("login").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");
    document.getElementById("nom").value = PIN_LIST[pin];
    loginMessage.textContent = "";
  } else {
    loginMessage.textContent = "PIN invalide !";
  }
}

// Envoi des données
function envoyer(){
  const nom = document.getElementById("nom").value.trim();
  const type = document.getElementById("type").value;
  const equipement = document.getElementById("equipement").value.trim();
  const valeur = document.getElementById("valeur").value.trim();

  if(!nom || !equipement || !valeur){
    alert("Veuillez remplir tous les champs.");
    return;
  }

  const data = { type, nom, equipement, valeur };

  fetch(API_URL, {
    method:"POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    if(res.status === "success"){
      alert("✅ Donnée envoyée !");
      document.getElementById("equipement").value = "";
      document.getElementById("valeur").value = "";
    } else {
      alert("❌ Erreur serveur : " + res.message);
    }
  })
  .catch(err => alert("❌ Erreur réseau : " + err));
}
</script>

</body>
</html>
