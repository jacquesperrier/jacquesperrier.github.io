<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERDICT IA - Système Expert</title>
    <style>
        /* CONFIGURATION GRAPHIQUE COMPLÈTE (PRESTIGE NOIR & OR) */
        :root {
            --gold: #D4AF37;
            --black: #000000;
            --dark-bg: #0a0a0a;
            --grey: #1a1a1a;
            --red: #FF0000;
            --white: #FFFFFF;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 25px 0;
            text-align: center;
            background: linear-gradient(to bottom, #111, #000);
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2);
        }

        .logo-text {
            color: var(--gold);
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 6px;
            margin: 0;
        }

        .tagline {
            color: var(--gold);
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 5px;
            opacity: 0.9;
        }

        /* DASHBOARD - GRILLE DE PERFORMANCE */
        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            box-sizing: border-box;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .card {
            background-color: var(--grey);
            border: 1.5px solid var(--gold);
            border-radius: 12px;
            padding: 25px 10px;
            text-align: center;
            transition: transform 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }

        .card:active {
            transform: scale(0.95);
            background-color: var(--gold);
            color: var(--black);
        }

        .card-icon { font-size: 1.8rem; margin-bottom: 8px; }
        .card-label { font-weight: bold; font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; }

        /* MODAL ET FORMULAIRE DYNAMIQUE */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal {
            width: 90%;
            max-width: 380px;
            background-color: var(--grey);
            border: 2px solid var(--gold);
            border-radius: 15px;
            padding: 25px;
            box-sizing: border-box;
        }

        .modal h2 { color: var(--gold); text-align: center; margin-top: 0; font-size: 1.3rem; text-transform: uppercase; }

        .form-group { margin-bottom: 15px; }
        label { display: block; color: var(--gold); font-size: 0.75rem; margin-bottom: 5px; text-transform: uppercase; }

        input {
            width: 100%;
            padding: 14px;
            background-color: #000;
            border: 1px solid #444;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--gold); outline: none; }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: var(--gold);
            color: var(--black);
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-cancel {
            width: 100%;
            padding: 10px;
            background: transparent;
            color: #777;
            border: none;
            margin-top: 10px;
        }

    </style>
</head>
<body>

    <header>
        <h1 class="logo-text">VERDICT IA</h1>
        <div class="tagline">Conformité MAPAQ & Performance</div>
    </header>

    <div class="container">
        <div class="dashboard-grid">
            <div class="card" onclick="ouvrirModule('heure', 'PUNCH HEURES', 'Action (IN/OUT)')">
                <span class="card-icon">🕒</span><span class="card-label">Punch</span>
            </div>
            <div class="card" onclick="ouvrirModule('temp', 'TEMPÉRATURE', 'Degrés Celsius (°C)')">
                <span class="card-icon">🌡️</span><span class="card-label">Sécurité</span>
            </div>
            <div class="card" onclick="ouvrirModule('nettoyage', 'NETTOYAGE', 'Tâche complétée')">
                <span class="card-icon">🧼</span><span class="card-label">Hygiène</span>
            </div>
            <div class="card" onclick="ouvrirModule('reception', 'RÉCEPTION', 'Temp. Camion')">
                <span class="card-icon">🚚</span><span class="card-label">Contrôle</span>
            </div>
            <div class="card" onclick="ouvrirModule('formation', 'ACADÉMIE', 'Score Quiz')">
                <span class="card-icon">🎓</span><span class="card-label">Formation</span>
            </div>
            <div class="card" onclick="window.location.reload()">
                <span class="card-icon">🔄</span><span class="card-label">Sync</span>
            </div>
        </div>
    </div>

    <div id="overlay" class="overlay">
        <div class="modal">
            <h2 id="mTitle">MODULE</h2>
            
            <div class="form-group">
                <label>Code PIN ou Nom</label>
                <input type="text" id="mEmp" placeholder="Identification">
            </div>

            <div class="form-group">
                <label id="mLabelVal">Valeur</label>
                <input type="text" id="mVal" placeholder="Saisir la donnée">
            </div>

            <div id="mNoteGroup" class="form-group">
                <label>Note / Fournisseur</label>
                <input type="text" id="mNote" placeholder="Commentaires">
            </div>

            <button class="btn-submit" onclick="analyserEtEnvoyer()">ENREGISTRER</button>
            <button class="btn-cancel" onclick="fermerModule()">ANNULER</button>
        </div>
    </div>

    <script>
        let currentType = "";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyclVwHhv90BPF9N_VCdTB5LBUy7-XtwLOEQUcirGMV8L-IIzgbtXzdJUVTl74eH9ZU/exec";

        function ouvrirModule(type, title, label) {
            currentType = type;
            document.getElementById('mTitle').innerText = title;
            document.getElementById('mLabelVal').innerText = label;
            document.getElementById('overlay').style.display = 'flex';
        }

        function fermerModule() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('mVal').value = "";
            document.getElementById('mNote').value = "";
        }

        function analyserEtEnvoyer() {
            const emp = document.getElementById('mEmp').value;
            const val = document.getElementById('mVal').value;
            let note = document.getElementById('mNote').value;

            if (!emp || !val) {
                alert("Erreur : Champs obligatoires manquants.");
                return;
            }

            // LOGIQUE DE CONFORMITÉ (RETOUR À L'ORIGINAL)
            if (currentType === 'temp' || currentType === 'reception') {
                const t = parseFloat(val);
                if (t > 4) { note += " ⚠️ ALERTE MAPAQ : HORS NORME"; }
            }

            const payload = {
                type: currentType,
                employe: emp,
                valeur: val,
                note: note
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert("✓ ENREGISTRÉ DANS VERDICT IA");
                fermerModule();
            })
            .catch(err => alert("Erreur de liaison : " + err));
        }
    </script>
</body>
</html>
