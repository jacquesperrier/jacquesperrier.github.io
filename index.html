<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERDICT IA</title>
    <style>
        /* DESIGN NOIR & OR GÉNÉRÉ POUR VERDICT IA */
        body { background-color: #000000; color: #D4AF37; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 0; }
        .subtitle { font-size: 0.7rem; margin-bottom: 30px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        
        .btn-v { 
            background: #1A1A1A; border: 2px solid #D4AF37; color: #D4AF37; 
            padding: 25px 10px; border-radius: 10px; font-weight: bold; text-align: center;
            cursor: pointer; font-size: 1rem;
        }

        /* FENÊTRE DE SAISIE */
        #form-v { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1A1A1A; border: 3px solid #D4AF37; padding: 20px; width: 80%; z-index: 100;
        }
        
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #D4AF37; color: #fff; box-sizing: border-box; }
        .btn-save { background: #D4AF37; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>VERDICT IA</h1>
    <p class="subtitle">CONFORMITÉ MAPAQ & GESTION</p>

    <div class="grid">
        <div class="btn-v" onclick="openV('heure')">🕒 PUNCH</div>
        <div class="btn-v" onclick="openV('temp')">🌡️ SÉCURITÉ</div>
        <div class="btn-v" onclick="openV('nettoyage')">🧼 HYGIÈNE</div>
        <div class="btn-v" onclick="openV('reception')">🚚 RÉCEPTION</div>
        <div class="btn-v" onclick="openV('formation')">🎓 ACADÉMIE</div>
    </div>

    <div id="form-v">
        <h2 id="title-v" style="margin-top:0"></h2>
        <input type="text" id="emp" placeholder="Nom de l'employé">
        <input type="text" id="val" placeholder="Valeur (ex: 3.5 ou Entrée)">
        <input type="text" id="note" placeholder="Notes (ex: Sysco)">
        <button class="btn-save" onclick="sendV()">ENREGISTRER</button>
        <button onclick="closeV()" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">Annuler</button>
    </div>

    <script>
        let currentMode = "";
        // TON URL GOOGLE SCRIPT GÉNÉRÉE
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyclVwHhv90BPF9N_VCdTB5LBUy7-XtwLOEQUcirGMV8L-IIzgbtXzdJUVTl74eH9ZU/exec";

        function openV(type) {
            currentMode = type;
            document.getElementById('title-v').innerText = type.toUpperCase();
            document.getElementById('form-v').style.display = 'block';
        }

        function closeV() { document.getElementById('form-v').style.display = 'none'; }

        function sendV() {
            const payload = {
                type: currentMode,
                employe: document.getElementById('emp').value,
                valeur: document.getElementById('val').value,
                note: document.getElementById('note').value
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            }).then(() => {
                alert("✓ ENREGISTRÉ");
                document.getElementById('val').value = "";
                closeV();
            }).catch(e => alert("Erreur: " + e));
        }
    </script>
</body>
</html>
