<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verdict Fix</title>
</head>
<body>
    <input type="text" id="n" placeholder="Nom">
    <input type="text" id="o" placeholder="Objet">
    <input type="number" id="v" placeholder="Valeur">
    <button onclick="send()">ENVOYER</button>

    <script>
        // COLLEZ VOTRE URL ENTRE LES GUILLEMETS CI-DESSOUS
        const url = 'https://script.google.com/macros/s/AKfycbyodaY4I6Kv6KBmOVfbeAL-pPDKQUzBhI8F7H4_KtMB8Q8CbM3sMvLPbdA8-XdS8YQk/exec';

        function send() {
            const d = {
                nom: document.getElementById('n').value,
                objet: document.getElementById('o').value,
                note: document.getElementById('v').value
            };

            fetch(url, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(d)
            }).then(() => alert("ENVOYÉ !"));
        }
    </script>
</body>
</html>
