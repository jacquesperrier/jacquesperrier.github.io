<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERDICT IA - Système Expert</title>
    <style>
        /* CONFIGURATION GRAPHIQUE COMPLÈTE (PRESTIGE) */
        :root {
            --gold: #D4AF37;
            --black: #000000;
            --dark-bg: #0a0a0a;
            --grey: #1a1a1a;
            --red: #FF0000;
            --white: #FFFFFF;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 30px 0;
            text-align: center;
            background: linear-gradient(to bottom, #111, #000);
            border-bottom: 1px solid var(--gold);
        }

        .logo-text {
            color: var(--gold);
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 5px;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .tagline {
            color: var(--gold);
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* DASHBOARD - GRILLE DE PERFORMANCE */
        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background-color: var(--grey);
            border: 1px solid var(--gold);
            border-radius: 12px;
            padding: 25px 10px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 110px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .card:active {
            transform: scale(0.95);
            background-color: var(--gold);
            color: var(--black);
        }

        .card i { font-size: 1.8rem; margin-bottom: 10px; }
        .card span { font-weight: bold; font-size: 0.9rem; letter-spacing: 1px; }

        /* MODAL ET FORMULAIRE DYNAMIQUE */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal {
            width: 90%;
            max-width: 400px;
            background-color: var(--grey);
            border: 2px solid var(--gold);
            border-radius: 15px;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
        }

        .modal-h2 {
            color: var(--gold);
            margin-top: 0;
            text-align: center;
            text-transform: uppercase;
            font-size: 1.4rem;
        }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            color: var(--gold);
            font-size: 0.8rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background-color: #000;
            border: 1px solid #444;
            border-radius: 5px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--gold); outline: none; }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: var(--gold);
            color: var(--black);
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-cancel {
            width: 100%;
            padding: 10px;
            background: transparent;
            color: #888;
            border: none;
            margin-top: 10px;
            cursor: pointer;
        }

        /* STATUS COLORS */
        .status-ok { color: #4CAF50; }
        .status-alert { color: var(--red); }

    </style>
</head>
<body>

    <header>
        <h1 class="logo-text">VERDICT IA</h1>
        <div class="tagline">Système de Conformité Haute Précision</div>
    </header>

    <div class="container">
        <div class="dashboard-grid">
            <div class="card" onclick="openModule('heure', 'Pointage Heures', 'Action (IN/OUT)')">
                <i>🕒</i><span>PUNCH</span>
            </div>
            <div class="card" onclick="openModule('temp', 'Sécurité Frigo', 'Température (°C)')">
                <i>🌡️</i><span>TEMPÉRATURE</span>
            </div>
            <div class="card" onclick="openModule('nettoyage', 'Salubrité', 'Tâche effectuée')">
                <i>🧼</i><span>NETTOYAGE</span>
            </div>
            <div class="card" onclick="openModule('reception', 'Réception', 'Temp. du Camion')">
                <i>🚚</i><span>RÉCEPTION</span>
            </div>
            <div class="card" onclick="openModule('formation', 'Académie', 'Score Quiz')">
                <i>🎓</i><span>FORMATION</span>
            </div>
            <div class="card" onclick="window.location.reload()">
                <i>🔄</i><span>RAFRAÎCHIR</span>
            </div>
        </div>
    </div>

    <div id="overlay" class="overlay">
        <div class="modal">
            <h2 id="modalTitle" class="modal-h2">MODULE</h2>
            
            <div class="form-group">
                <label>Employé (PIN)</label>
                <input type="text" id="inputEmp" placeholder="Entrez votre nom ou code">
            </div>

            <div class="form-group">
                <label id="labelValeur">Valeur</label>
                <input type="text" id="inputVal" placeholder="Saisir la donnée">
            </div>

            <div id="extraField" class="form-group" style="display:none;">
                <label>Note / Fournisseur</label>
                <input type="text" id="inputNote" placeholder="Détails supplémentaires">
            </div>

            <button class="btn-submit" onclick="processAndSend()">ENREGISTRER AU REGISTRE</button>
            <button class="btn-cancel" onclick="closeModule()">ANNULER</button>
        </div>
    </div>

    <script>
        let currentType = "";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyclVwHhv90BPF9N_VCdTB5LBUy7-XtwLOEQUcirGMV8L-IIzgbtXzdJUVTl74eH9ZU/exec";

        function openModule(type, title, valLabel) {
            currentType = type;
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('labelValeur').innerText = valLabel;
            document.getElementById('overlay').style.display = 'flex';
            
            // Afficher le champ note pour la réception ou la formation
            if (type === 'reception' || type === 'formation') {
                document.getElementById('extraField').style.display = 'block';
            } else {
                document.getElementById('extraField').style.display = 'none';
            }
        }

        function closeModule() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('inputVal').value = "";
            document.getElementById('inputNote').value = "";
        }

        function processAndSend() {
            const emp = document.getElementById('inputEmp').value;
            const val = document.getElementById('inputVal').value;
            const note = document.getElementById('inputNote').value;

            if (!emp || !val) {
                alert("Erreur: Les champs obligatoires sont vides.");
                return;
            }

            // ANALYSE DE CONFORMITÉ EN TEMPS RÉEL
            let verdictNote = note;
            if (currentType === 'temp' || currentType === 'reception') {
                const tempNum = parseFloat(val);
                if (tempNum > 4) {
                    verdictNote += " ⚠️ ALERTE : HORS NORME (>4°C)";
                }
            }

            const payload = {
                type: currentType,
                employe: emp,
                valeur: val,
                note: verdictNote
            };

            // APPEL API VERDICT
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert("✓ VERDICT IA : Donnée enregistrée avec succès.");
                closeModule();
            })
            .catch(err => {
                console.error("Erreur de liaison:", err);
                alert("Erreur de communication avec le serveur.");
            });
        }
    </script>
</body>
</html>
