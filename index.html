<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Verdict - Saisie</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        input, button { display: block; width: 100%; margin-bottom: 10px; padding: 10px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Rapport d'Inspection</h2>
    <input type="text" id="employe" placeholder="Nom de l'employé" required>
    <input type="text" id="item" placeholder="Item inspecté" required>
    <input type="number" id="valeur" placeholder="Valeur / Température" required>
    <input type="text" id="commentaire" placeholder="Commentaire">
    <button id="btnEnvoyer" onclick="envoyerDonnees()">ENVOYER</button>

    <script>
        // REMPLACEZ UNIQUEMENT CETTE URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzbsLtYgg1MWvVr5se4bVeNpWauHJ0nPqJGFfmAjvqFbuRzCELi3CqcQhP-9lDCJW0/exec';

        function envoyerDonnees() {
            const btn = document.getElementById('btnEnvoyer');
            btn.disabled = true; // Empêche de cliquer deux fois (fini les 400 entrées)
            btn.innerText = "Envoi en cours...";

            const payload = {
                employe: document.getElementById('employe').value,
                item: document.getElementById('item').value,
                valeur: document.getElementById('valeur').value,
                commentaire: document.getElementById('commentaire').value
            };

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', // Force le passage à travers les sécurités
                cache: 'no-cache',
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert("Données transmises au tableau !");
                location.reload(); // Reset complet de la page
            })
            .catch(error => {
                alert("Erreur de connexion");
                btn.disabled = false;
                btn.innerText = "Réessayer";
            });
        }
    </script>
</body>
