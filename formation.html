<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Verdict — Formation HACCP</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: #0A0A0A; color: #FFFFFF; font-family: 'Rajdhani', sans-serif; min-height: 100vh; max-width: 430px; margin: 0 auto; overflow-x: hidden; }

.screen { display: none; flex-direction: column; min-height: 100vh; animation: fadeIn 0.25s ease; }
.screen.active { display: flex; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* HEADER */
.header {
background: linear-gradient(180deg, #000 0%, #141414 100%);
border-bottom: 1px solid rgba(212,160,23,0.2);
padding: 14px 18px;
display: flex; align-items: center; gap: 12px;
position: sticky; top: 0; z-index: 100;
}
.logo-v {
width: 36px; height: 36px; background: linear-gradient(135deg, #D4A017, #FFD700);
border-radius: 7px; display: flex; align-items: center; justify-content: center;
font-family: ‘Cormorant Garamond’, serif; font-weight: 700; font-size: 22px; color: #0A0A0A;
}
.header-title { font-family: ‘Cormorant Garamond’, serif; }
.header-title .brand { font-size: 18px; font-weight: 700; color: #D4A017; letter-spacing: 1px; }
.header-title .sub { font-size: 10px; color: #888; letter-spacing: 2px; text-transform: uppercase; }
.btn-back { background: none; border: none; color: #D4A017; font-size: 22px; cursor: pointer; padding: 4px; margin-left: auto; }

/* MODULES LIST */
.modules-header { padding: 20px 18px 10px; }
.modules-header h1 { font-family: ‘Cormorant Garamond’, serif; font-size: 28px; color: #FFFFFF; }
.modules-header p { font-size: 12px; color: #888; margin-top: 4px; }

.progress-bar-wrap { margin: 12px 18px; background: #1E1E1E; border-radius: 20px; height: 6px; }
.progress-bar { height: 6px; border-radius: 20px; background: linear-gradient(90deg, #D4A017, #FFD700); transition: width 0.5s ease; }

.module-list { padding: 0 18px 100px; display: flex; flex-direction: column; gap: 12px; }
.module-item {
background: #141414; border: 1px solid rgba(212,160,23,0.2); border-radius: 14px;
padding: 16px; cursor: pointer; transition: all 0.2s;
display: flex; align-items: center; gap: 14px;
position: relative; overflow: hidden;
}
.module-item::before {
content: ‘’; position: absolute; top: 0; left: 0; right: 0; height: 2px;
background: linear-gradient(90deg, #D4A017, transparent);
}
.module-item:active { transform: scale(0.98); }
.module-item.completed { border-color: rgba(76,175,80,0.3); }
.module-item.completed::before { background: linear-gradient(90deg, #4CAF50, transparent); }
.module-icon { font-size: 32px; flex-shrink: 0; }
.module-info { flex: 1; }
.module-name { font-size: 15px; font-weight: 700; color: #FFFFFF; }
.module-meta { font-size: 11px; color: #888; margin-top: 3px; }
.module-badge {
font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
flex-shrink: 0;
}
.badge-done { background: rgba(76,175,80,0.15); color: #4CAF50; border: 1px solid #2E7D32; }
.badge-todo { background: rgba(212,160,23,0.12); color: #D4A017; border: 1px solid rgba(212,160,23,0.4); }
.badge-locked { background: rgba(136,136,136,0.1); color: #888; border: 1px solid #555; }

/* LESSONS LIST */
.lessons-header { padding: 20px 18px 10px; }
.lessons-header h2 { font-family: ‘Cormorant Garamond’, serif; font-size: 24px; color: #FFFFFF; }
.lessons-header .module-desc { font-size: 13px; color: #888; margin-top: 6px; line-height: 1.4; }

.lesson-list { padding: 0 18px 100px; display: flex; flex-direction: column; gap: 10px; }
.lesson-item {
background: #141414; border: 1px solid rgba(212,160,23,0.2); border-radius: 12px;
padding: 14px 16px; cursor: pointer; transition: all 0.2s;
display: flex; align-items: center; gap: 12px;
}
.lesson-item:active { transform: scale(0.98); background: #1E1E1E; }
.lesson-item.completed { border-color: rgba(76,175,80,0.3); }
.lesson-num {
width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(212,160,23,0.4);
display: flex; align-items: center; justify-content: center;
font-size: 13px; font-weight: 700; color: #D4A017; flex-shrink: 0;
}
.lesson-item.completed .lesson-num { background: rgba(76,175,80,0.15); border-color: #4CAF50; color: #4CAF50; }
.lesson-info { flex: 1; }
.lesson-title { font-size: 14px; font-weight: 600; color: #FFFFFF; }
.lesson-duration { font-size: 11px; color: #888; margin-top: 2px; }
.lesson-arrow { color: #D4A017; font-size: 16px; }

/* LESSON CONTENT */
.lesson-content { padding: 0 0 100px; overflow-y: auto; }
.lesson-hero {
background: linear-gradient(135deg, #141414, #1E1E1E);
border-bottom: 1px solid rgba(212,160,23,0.2);
padding: 20px 18px;
}
.lesson-hero .lesson-num-big {
font-size: 11px; color: #D4A017; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px;
}
.lesson-hero h3 { font-family: ‘Cormorant Garamond’, serif; font-size: 26px; color: #FFFFFF; line-height: 1.2; }
.lesson-hero .duration { font-size: 12px; color: #888; margin-top: 6px; }

.content-block { padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.content-block h4 { font-size: 13px; letter-spacing: 2px; color: #D4A017; text-transform: uppercase; margin-bottom: 10px; }
.content-block p { font-size: 14px; color: #CCC; line-height: 1.6; margin-bottom: 10px; }
.content-block p:last-child { margin-bottom: 0; }

.key-points { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.key-points li {
background: rgba(212,160,23,0.08); border: 1px solid rgba(212,160,23,0.2);
border-radius: 8px; padding: 10px 14px;
font-size: 13px; color: #FFFFFF; line-height: 1.4;
display: flex; align-items: flex-start; gap: 10px;
}
.key-points li::before { content: ‘✦’; color: #D4A017; flex-shrink: 0; margin-top: 1px; }

.warning-box {
background: rgba(198,40,40,0.1); border: 1px solid rgba(198,40,40,0.3);
border-radius: 10px; padding: 12px 14px; margin: 10px 0;
font-size: 13px; color: #FF8A80; line-height: 1.5;
}
.warning-box::before { content: ’⚠️ ’; }

.info-box {
background: rgba(33,150,243,0.1); border: 1px solid rgba(33,150,243,0.3);
border-radius: 10px; padding: 12px 14px; margin: 10px 0;
font-size: 13px; color: #90CAF9; line-height: 1.5;
}
.info-box::before { content: ’ℹ️ ’; }

.temp-table { width: 100%; border-collapse: collapse; margin: 10px 0; }
.temp-table th { background: rgba(212,160,23,0.15); color: #D4A017; font-size: 11px; letter-spacing: 1px; padding: 8px 10px; text-align: left; }
.temp-table td { padding: 8px 10px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #CCC; }
.temp-table tr:last-child td { border-bottom: none; }

/* QUIZ */
.quiz-section { padding: 16px 18px; }
.quiz-section h4 { font-size: 13px; letter-spacing: 2px; color: #D4A017; text-transform: uppercase; margin-bottom: 16px; }
.quiz-question { margin-bottom: 20px; }
.quiz-q { font-size: 14px; font-weight: 600; color: #FFFFFF; margin-bottom: 10px; line-height: 1.4; }
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-option {
background: #1E1E1E; border: 1px solid rgba(212,160,23,0.2);
border-radius: 8px; padding: 10px 14px; cursor: pointer;
font-size: 13px; color: #CCC; transition: all 0.15s;
display: flex; align-items: center; gap: 10px;
}
.quiz-option:active { background: #2A2A2A; }
.quiz-option.selected { background: rgba(212,160,23,0.1); border-color: #D4A017; color: #FFFFFF; }
.quiz-option.correct { background: rgba(76,175,80,0.15); border-color: #4CAF50; color: #4CAF50; }
.quiz-option.wrong { background: rgba(198,40,40,0.15); border-color: #C62828; color: #FF8A80; }
.quiz-letter {
width: 24px; height: 24px; border-radius: 50%; border: 1px solid rgba(212,160,23,0.4);
display: flex; align-items: center; justify-content: center;
font-size: 11px; font-weight: 700; color: #D4A017; flex-shrink: 0;
}

.quiz-feedback { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 8px; display: none; line-height: 1.4; }
.quiz-feedback.show { display: block; }
.quiz-feedback.correct-fb { background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.3); color: #81C784; }
.quiz-feedback.wrong-fb { background: rgba(198,40,40,0.1); border: 1px solid rgba(198,40,40,0.3); color: #FF8A80; }

/* BTN */
.btn-wrap { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; padding: 12px 18px; background: linear-gradient(transparent, #0A0A0A 40%); z-index: 200; }
.btn-primary {
width: 100%; padding: 16px;
background: linear-gradient(135deg, #D4A017, #FFD700);
border: none; border-radius: 12px; color: #0A0A0A;
font-family: ‘Rajdhani’, sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 3px;
cursor: pointer;
}

/* SCORE */
.score-screen { padding: 40px 18px; display: flex; flex-direction: column; align-items: center; gap: 20px; text-align: center; }
.score-circle-big {
width: 140px; height: 140px; border-radius: 50%;
border: 8px solid rgba(212,160,23,0.2);
display: flex; flex-direction: column; align-items: center; justify-content: center;
background: #141414;
}
.score-circle-big .score-num { font-size: 42px; font-weight: 700; color: #D4A017; line-height: 1; }
.score-circle-big .score-label { font-size: 12px; color: #888; }
.score-title { font-family: ‘Cormorant Garamond’, serif; font-size: 28px; color: #FFFFFF; }
.score-msg { font-size: 14px; color: #888; line-height: 1.5; max-width: 300px; }
.score-badge { background: rgba(212,160,23,0.12); border: 1px solid #D4A017; border-radius: 20px; padding: 8px 20px; font-size: 12px; font-weight: 700; color: #D4A017; letter-spacing: 1px; }

/* TOAST */
.toast {
position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
background: #141414; border: 1px solid #D4A017; border-radius: 10px;
padding: 12px 20px; font-size: 13px; font-weight: 600; color: #D4A017;
opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { border-color: #4CAF50; color: #4CAF50; }
</style>

</head>
<body>

<!-- SCREEN: MODULE LIST -->

<div id="screen-modules" class="screen active">
  <div class="header">
    <div class="logo-v">V</div>
    <div class="header-title">
      <div class="brand">FORMATION</div>
      <div class="sub">Modules HACCP · MAPAQ</div>
    </div>
    <button class="btn-back" onclick="goHome()">🏠</button>
  </div>
  <div class="modules-header">
    <h1>Vos formations</h1>
    <p>6 modules · 35 leçons · Certifications incluses</p>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="global-progress" style="width:0%"></div>
  </div>
  <div class="module-list" id="module-list"></div>
</div>

<!-- SCREEN: LESSON LIST -->

<div id="screen-lessons" class="screen">
  <div class="header">
    <div class="logo-v">V</div>
    <div class="header-title">
      <div class="brand" id="lessons-module-name">MODULE</div>
      <div class="sub">Leçons disponibles</div>
    </div>
    <button class="btn-back" onclick="showScreen('modules')">←</button>
  </div>
  <div class="lessons-header">
    <h2 id="lessons-title"></h2>
    <p class="module-desc" id="lessons-desc"></p>
  </div>
  <div class="lesson-list" id="lesson-list"></div>
</div>

<!-- SCREEN: LESSON CONTENT -->

<div id="screen-lesson" class="screen">
  <div class="header">
    <div class="logo-v">V</div>
    <div class="header-title">
      <div class="brand" id="lesson-module-name">LEÇON</div>
      <div class="sub" id="lesson-progress-label">Leçon 1/7</div>
    </div>
    <button class="btn-back" id="lesson-back-btn">←</button>
  </div>
  <div class="lesson-content" id="lesson-content"></div>
  <div class="btn-wrap">
    <button class="btn-primary" id="btn-next-lesson" onclick="nextLesson()">SUIVANT →</button>
  </div>
</div>

<!-- SCREEN: SCORE -->

<div id="screen-score" class="screen">
  <div class="header">
    <div class="logo-v">V</div>
    <div class="header-title">
      <div class="brand">RÉSULTAT</div>
      <div class="sub">Module complété</div>
    </div>
  </div>
  <div class="score-screen">
    <div class="score-circle-big">
      <div class="score-num" id="final-score">0%</div>
      <div class="score-label">Score</div>
    </div>
    <div class="score-title" id="score-title">Bien joué!</div>
    <div class="score-msg" id="score-msg"></div>
    <div class="score-badge" id="score-badge"></div>
  </div>
  <div class="btn-wrap" style="display:flex;gap:10px">
    <button class="btn-primary" style="background:#1E1E1E;color:#D4A017;border:1px solid #D4A017" onclick="retryModule()">↺ RECOMMENCER</button>
    <button class="btn-primary" onclick="showScreen('modules')">MODULES →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────
const MODULES = [
  {
    id: 'haccp',
    icon: '🦠',
    name: 'HACCP — Principes fondamentaux',
    meta: '7 leçons · 45 min · Niveau 1',
    desc: 'Maîtrisez les 7 principes HACCP, l\'identification des points critiques et la mise en place d\'un plan de maîtrise sanitaire conforme aux exigences MAPAQ.',
    lessons: [
      {
        title: 'Introduction au HACCP',
        duration: '5 min',
        content: [
          { type: 'intro', num: 'LEÇON 1', title: 'Introduction au HACCP', duration: '5 min de lecture' },
          { type: 'text', heading: 'Qu\'est-ce que le HACCP?', body: 'HACCP signifie Hazard Analysis Critical Control Points — en français, Analyse des dangers et maîtrise des points critiques. C\'est un système préventif de gestion de la sécurité alimentaire reconnu mondialement.\n\nDéveloppé dans les années 1960 pour les astronautes de la NASA, le HACCP est aujourd\'hui obligatoire dans de nombreux pays, dont le Canada, pour les établissements alimentaires.' },
          { type: 'keypoints', heading: 'Points clés', points: [
            'Le HACCP est préventif, pas réactif — on anticipe les dangers avant qu\'ils surviennent',
            'Reconnu par l\'Organisation Mondiale de la Santé (OMS) et Santé Canada',
            'Obligatoire au Québec pour les établissements sous réglementation MAPAQ',
            'Applicable à toute la chaîne alimentaire — de la ferme à la table'
          ]},
          { type: 'info', text: 'Au Québec, la Loi sur les produits alimentaires et ses règlements d\'application exigent que les exploitants d\'établissements alimentaires contrôlent les risques pour la salubrité des aliments.' },
          { type: 'quiz', questions: [
            { q: 'Que signifie l\'acronyme HACCP?', options: ['Hygiène Alimentaire et Contrôle des Conditions de Production', 'Hazard Analysis Critical Control Points', 'Haute Autorité de Certification des Conditions de Production', 'Hygiène et Assurance Contrôle des Conditions Préventives'], correct: 1, feedback: 'HACCP = Hazard Analysis Critical Control Points (Analyse des dangers et maîtrise des points critiques).' },
            { q: 'Le HACCP est un système:', options: ['Réactif — on agit après un problème', 'Préventif — on anticipe les dangers', 'Optionnel pour les restaurants', 'Seulement pour les grandes usines'], correct: 1, feedback: 'Le HACCP est fondamentalement préventif. On identifie et contrôle les dangers avant qu\'ils causent un problème.' },
            { q: 'Qui a développé le HACCP à l\'origine?', options: ['L\'Organisation Mondiale de la Santé', 'La NASA pour les astronautes', 'Le gouvernement canadien', 'L\'Union Européenne'], correct: 1, feedback: 'Le HACCP a été développé dans les années 1960 pour garantir la sécurité alimentaire des astronautes de la NASA.' }
          ]}
        ]
      },
      {
        title: 'Les 7 principes HACCP',
        duration: '8 min',
        content: [
          { type: 'intro', num: 'LEÇON 2', title: 'Les 7 principes HACCP', duration: '8 min de lecture' },
          { type: 'text', heading: 'Les 7 principes fondamentaux', body: 'Le système HACCP repose sur 7 principes qui forment une séquence logique. Chaque principe s\'appuie sur le précédent pour créer un système complet de gestion des risques alimentaires.' },
          { type: 'keypoints', heading: 'Les 7 principes', points: [
            '1. Analyser les dangers — identifier tous les dangers biologiques, chimiques et physiques',
            '2. Identifier les CCP — déterminer les points de contrôle critiques',
            '3. Établir les limites critiques — définir les seuils acceptables pour chaque CCP',
            '4. Surveiller les CCP — mettre en place des procédures de surveillance',
            '5. Actions correctives — définir les mesures en cas de déviation',
            '6. Vérification — confirmer que le système fonctionne correctement',
            '7. Documentation — tenir des registres et enregistrements'
          ]},
          { type: 'warning', text: 'Un plan HACCP sans documentation n\'est pas valide. Les registres sont la preuve que vous appliquez le système — c\'est exactement ce que l\'app Verdict permet de faire automatiquement.' },
          { type: 'quiz', questions: [
            { q: 'Combien y a-t-il de principes HACCP?', options: ['5', '6', '7', '8'], correct: 2, feedback: 'Il y a exactement 7 principes HACCP, formant une séquence logique et complète.' },
            { q: 'Quel est le 2e principe HACCP?', options: ['Analyser les dangers', 'Identifier les CCP', 'Établir les limites critiques', 'Surveiller les CCP'], correct: 1, feedback: 'Le 2e principe est l\'identification des Points de Contrôle Critiques (CCP).' },
            { q: 'Pourquoi la documentation est-elle essentielle?', options: ['C\'est optionnel', 'C\'est la preuve que vous appliquez le système', 'Seulement pour les grandes entreprises', 'Pour satisfaire les clients'], correct: 1, feedback: 'La documentation est la preuve tangible que votre système HACCP fonctionne. Sans enregistrements, vous ne pouvez pas prouver votre conformité.' }
          ]}
        ]
      },
      {
        title: 'Identification des dangers',
        duration: '7 min',
        content: [
          { type: 'intro', num: 'LEÇON 3', title: 'Identification des dangers', duration: '7 min de lecture' },
          { type: 'text', heading: 'Les 3 types de dangers alimentaires', body: 'Le premier principe HACCP consiste à identifier tous les dangers potentiels. On distingue trois catégories principales de dangers qui peuvent rendre un aliment dangereux pour la consommation.' },
          { type: 'keypoints', heading: 'Catégories de dangers', points: [
            'Dangers biologiques — bactéries (Salmonella, E. coli, Listeria), virus, parasites. C\'est la catégorie la plus fréquente et la plus dangereuse',
            'Dangers chimiques — résidus de pesticides, produits de nettoyage, métaux lourds, additifs en excès',
            'Dangers physiques — corps étrangers (os, verre, métal, plastique, bijoux) pouvant causer des blessures'
          ]},
          { type: 'warning', text: 'Salmonella et E. coli O157:H7 sont responsables de milliers d\'hospitalisations chaque année au Canada. La cuisson adéquate (74°C minimum) les élimine efficacement.' },
          { type: 'quiz', questions: [
            { q: 'Combien y a-t-il de catégories de dangers alimentaires?', options: ['2', '3', '4', '5'], correct: 1, feedback: 'Il y a 3 catégories: biologiques, chimiques et physiques.' },
            { q: 'Quelle catégorie de danger est la plus fréquente?', options: ['Physique', 'Chimique', 'Biologique', 'Radioactif'], correct: 2, feedback: 'Les dangers biologiques (bactéries, virus, parasites) sont les plus fréquents et responsables de la majorité des TIAC (Toxi-infections alimentaires collectives).' },
            { q: 'Un bijou tombé dans un aliment est un danger:', options: ['Biologique', 'Chimique', 'Physique', 'Radiologique'], correct: 2, feedback: 'Un bijou est un danger physique — un corps étranger pouvant causer des blessures.' }
          ]}
        ]
      },
      {
        title: 'Points de Contrôle Critiques (CCP)',
        duration: '8 min',
        content: [
          { type: 'intro', num: 'LEÇON 4', title: 'Points de Contrôle Critiques', duration: '8 min de lecture' },
          { type: 'text', heading: 'Qu\'est-ce qu\'un CCP?', body: 'Un Point de Contrôle Critique (CCP) est une étape du processus de production où une mesure de maîtrise peut être appliquée pour prévenir, éliminer ou réduire à un niveau acceptable un danger pour la sécurité alimentaire.\n\nIl est crucial de distinguer les CCP des simples mesures de contrôle (CP) qui gèrent des conditions générales d\'hygiène.' },
          { type: 'keypoints', heading: 'Exemples de CCP en restauration', points: [
            'Cuisson — température à cœur suffisante pour détruire les pathogènes',
            'Refroidissement rapide — de 60°C à 4°C en moins de 2 heures',
            'Réception des marchandises — vérification de la température à la livraison',
            'Maintien au chaud — minimum 60°C pour les aliments servis chauds',
            'Congélation — maintien à -18°C ou moins'
          ]},
          { type: 'info', text: 'L\'arbre de décision HACCP aide à déterminer si une étape est un CCP. On pose 4 questions clés pour chaque danger identifié à chaque étape.' },
          { type: 'quiz', questions: [

// ── STATE ──────────────────────────────────────────────────
let progress = JSON.parse(localStorage.getItem('verdict_formation_progress') || '{}');
let currentModule = null;
let currentLesson = null;
let quizAnswers = {};
let quizCorrect = 0;
let quizTotal = 0;

// ── INIT ──────────────────────────────────────────────────
function init() {
  renderModules();
  updateGlobalProgress();
}

function updateGlobalProgress() {
  let total = 0, done = 0;
  MODULES.forEach(m => {
    m.lessons.forEach(l => {
      total++;
      if (progress[m.id + '_' + m.lessons.indexOf(l)]) done++;
    });
  });
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('global-progress').style.width = pct + '%';
}

function renderModules() {
  const list = document.getElementById('module-list');
  list.innerHTML = MODULES.map((m, mi) => {
    const totalLessons = m.lessons.length;
    const doneLessons = m.lessons.filter((l, li) => progress[m.id + '_' + li]).length;
    const completed = doneLessons === totalLessons;
    const badge = completed
      ? '<span class="module-badge badge-done">✓ Complété</span>'
      : doneLessons > 0
        ? `<span class="module-badge badge-todo">${doneLessons}/${totalLessons}</span>`
        : '<span class="module-badge badge-todo">À faire</span>';
    return `<div class="module-item ${completed?'completed':''}" onclick="openModule(${mi})">
      <div class="module-icon">${m.icon}</div>
      <div class="module-info">
        <div class="module-name">${m.name}</div>
        <div class="module-meta">${m.meta}</div>
      </div>
      ${badge}
    </div>`;
  }).join('');
}

function openModule(mi) {
  currentModule = MODULES[mi];
  document.getElementById('lessons-module-name').textContent = currentModule.icon + ' ' + currentModule.id.toUpperCase();
  document.getElementById('lessons-title').textContent = currentModule.name;
  document.getElementById('lessons-desc').textContent = currentModule.desc;
  renderLessons();
  showScreen('lessons');
}

function renderLessons() {
  const list = document.getElementById('lesson-list');
  list.innerHTML = currentModule.lessons.map((l, li) => {
    const done = progress[currentModule.id + '_' + li];
    return `<div class="lesson-item ${done?'completed':''}" onclick="openLesson(${li})">
      <div class="lesson-num">${done ? '✓' : li+1}</div>
      <div class="lesson-info">
        <div class="lesson-title">${l.title}</div>
        <div class="lesson-duration">${l.duration}</div>
      </div>
      <div class="lesson-arrow">→</div>
    </div>`;
  }).join('');
}

function openLesson(li) {
  currentLesson = li;
  quizAnswers = {};
  quizCorrect = 0;
  quizTotal = 0;
  document.getElementById('lesson-module-name').textContent = currentModule.icon + ' ' + currentModule.name.split('—')[0].trim().toUpperCase();
  document.getElementById('lesson-progress-label').textContent = 'Leçon ' + (li+1) + '/' + currentModule.lessons.length;
  document.getElementById('lesson-back-btn').onclick = () => showScreen('lessons');
  renderLesson();
  showScreen('lesson');
}

function renderLesson() {
  const lesson = currentModule.lessons[currentLesson];
  let html = '';
  lesson.content.forEach((block, bi) => {
    if (block.type === 'intro') {
      html += `<div class="lesson-hero">
        <div class="lesson-num-big">${block.num} · ${block.duration}</div>
        <h3>${block.title}</h3>
      </div>`;
    } else if (block.type === 'text') {
      const paras = block.body.split('\n\n').map(p => `<p>${p}</p>`).join('');
      html += `<div class="content-block"><h4>${block.heading}</h4>${paras}</div>`;
    } else if (block.type === 'keypoints') {
      const items = block.points.map(p => `<li>${p}</li>`).join('');
      html += `<div class="content-block"><h4>${block.heading}</h4><ul class="key-points">${items}</ul></div>`;
    } else if (block.type === 'warning') {
      html += `<div class="content-block"><div class="warning-box">${block.text}</div></div>`;
    } else if (block.type === 'info') {
      html += `<div class="content-block"><div class="info-box">${block.text}</div></div>`;
    } else if (block.type === 'table') {
      const headers = block.headers.map(h => `<th>${h}</th>`).join('');
      const rows = block.rows.map(r => `<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');
      html += `<div class="content-block"><h4>${block.heading}</h4><table class="temp-table"><tr>${headers}</tr>${rows}</table></div>`;
    } else if (block.type === 'quiz') {
      quizTotal += block.questions.length;
      let qhtml = '<div class="quiz-section"><h4>Quiz de la leçon</h4>';
      block.questions.forEach((q, qi) => {
        const qid = `q_${bi}_${qi}`;
        const letters = ['A','B','C','D'];
        const opts = q.options.map((o, oi) => `<div class="quiz-option" id="${qid}_${oi}" onclick="selectAnswer('${qid}', ${oi}, ${q.correct}, '${qid}_fb', this)">
          <span class="quiz-letter">${letters[oi]}</span>${o}</div>`).join('');
        qhtml += `<div class="quiz-question">
          <div class="quiz-q">${qi+1}. ${q.q}</div>
          <div class="quiz-options">${opts}</div>
          <div class="quiz-feedback" id="${qid}_fb"></div>
        </div>`;
      });
      qhtml += '</div>';
      html += qhtml;
    }
  });
  document.getElementById('lesson-content').innerHTML = html;
  const isLast = currentLesson === currentModule.lessons.length - 1;
  document.getElementById('btn-next-lesson').textContent = isLast ? 'TERMINER LE MODULE ✓' : 'LEÇON SUIVANTE →';
}

function selectAnswer(qid, selected, correct, fbId, el) {
  if (quizAnswers[qid] !== undefined) return;
  quizAnswers[qid] = selected;
  const opts = document.querySelectorAll(`[id^="${qid}_"]:not([id$="_fb"])`);
  opts.forEach((opt, i) => {
    if (i === correct) opt.classList.add('correct');
    else if (i === selected && selected !== correct) opt.classList.add('wrong');
  });
  const fb = document.getElementById(fbId);
  const lesson = currentModule.lessons[currentLesson];
  let feedback = '';
  lesson.content.forEach(block => {
    if (block.type === 'quiz') {
      block.questions.forEach((q, qi) => {
        if (fbId.includes(`_${qi}_fb`) || fbId.endsWith(`_${qi}_fb`)) feedback = q.feedback;
      });
    }
  });
  // Find the right feedback
  const parts = fbId.replace('_fb','').split('_');
  const bi = parseInt(parts[1]);
  const qi = parseInt(parts[2]);
  const qblock = lesson.content.filter(b => b.type === 'quiz')[0];
  if (qblock && qblock.questions[qi]) {
    feedback = qblock.questions[qi].feedback;
  }
  if (selected === correct) {
    quizCorrect++;
    fb.textContent = '✅ ' + feedback;
    fb.className = 'quiz-feedback show correct-fb';
  } else {
    fb.textContent = '❌ ' + feedback;
    fb.className = 'quiz-feedback show wrong-fb';
  }
}

function nextLesson() {
  progress[currentModule.id + '_' + currentLesson] = true;
  localStorage.setItem('verdict_formation_progress', JSON.stringify(progress));
  const isLast = currentLesson === currentModule.lessons.length - 1;
  if (isLast) {
    showScore();
  } else {
    currentLesson++;
    quizAnswers = {};
    quizCorrect = 0;
    quizTotal = 0;
    document.getElementById('lesson-progress-label').textContent = 'Leçon ' + (currentLesson+1) + '/' + currentModule.lessons.length;
    renderLesson();
    document.getElementById('lesson-content').scrollTop = 0;
    window.scrollTo(0,0);
  }
}

function showScore() {
  const doneLessons = currentModule.lessons.filter((l, li) => progress[currentModule.id + '_' + li]).length;
  const pct = Math.round(doneLessons / currentModule.lessons.length * 100);
  document.getElementById('final-score').textContent = pct + '%';
  if (pct === 100) {
    document.getElementById('score-title').textContent = '🏆 Module complété!';
    document.getElementById('score-msg').textContent = 'Félicitations! Vous avez complété toutes les leçons de ce module. Votre maîtrise de ce sujet contribue directement à la sécurité alimentaire de votre établissement.';
    document.getElementById('score-badge').textContent = '✓ CERTIFICATION ' + currentModule.name.split('—')[0].trim().toUpperCase();
  } else {
    document.getElementById('score-title').textContent = 'Bonne progression!';
    document.getElementById('score-msg').textContent = `Vous avez complété ${doneLessons} leçon(s) sur ${currentModule.lessons.length}. Continuez pour obtenir votre certification.`;
    document.getElementById('score-badge').textContent = doneLessons + '/' + currentModule.lessons.length + ' LEÇONS COMPLÉTÉES';
  }
  renderModules();
  updateGlobalProgress();
  showScreen('score');
}

function retryModule() {
  currentModule.lessons.forEach((l, li) => {
    delete progress[currentModule.id + '_' + li];
  });
  localStorage.setItem('verdict_formation_progress', JSON.stringify(progress));
  renderModules();
  updateGlobalProgress();
  openLesson(0);
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo(0,0);
}

function goHome() {
  if (window.opener) window.close();
  else window.location.href = 'index.html';
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(() => { t.className = 'toast'; }, 2800);
}

init();
</script>
