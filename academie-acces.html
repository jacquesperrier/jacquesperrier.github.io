<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accès — ACADÉMIE Verdict 360 AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, 'Georgia', serif;
    background: #0A0A0A;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .container {
    width: 100%;
    max-width: 420px;
  }

  /* EN-TÊTE */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }
  .brand {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: linear-gradient(110deg, #9C7F3D 0%, #B8954A 35%, #F0E4C0 50%, #B8954A 65%, #9C7F3D 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 11px;
    color: #666;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* CARTE */
  .card {
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 32px 28px;
  }

  .lock-icon {
    text-align: center;
    font-size: 40px;
    margin-bottom: 20px;
  }

  .card h1 {
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 8px;
    color: #fff;
  }

  .card p {
    font-size: 13px;
    color: #888;
    text-align: center;
    line-height: 1.6;
    margin-bottom: 28px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* CHAMP CODE */
  .code-input {
    width: 100%;
    background: #0A0A0A;
    border: 2px solid #333;
    border-radius: 8px;
    color: #fff;
    font-size: 32px;
    font-weight: bold;
    text-align: center;
    letter-spacing: 8px;
    padding: 18px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .code-input:focus {
    outline: none;
    border-color: #B8954A;
  }
  .code-input::placeholder {
    color: #333;
    letter-spacing: 4px;
    font-size: 24px;
  }

  /* BOUTON */
  .btn {
    width: 100%;
    background: linear-gradient(110deg, #9C7F3D 0%, #B8954A 50%, #9C7F3D 100%);
    color: #0A0A0A;
    border: none;
    border-radius: 8px;
    padding: 16px;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    margin-bottom: 16px;
    transition: opacity 0.2s;
  }
  .btn:active { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* MESSAGES */
  .message {
    display: none;
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 13px;
    text-align: center;
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .message.error {
    display: block;
    background: #2b0d0d;
    border: 1px solid #f44336;
    color: #EF9A9A;
  }
  .message.success {
    display: block;
    background: #0d2b0d;
    border: 1px solid #4CAF50;
    color: #81C784;
  }
  .message.loading {
    display: block;
    background: #1a1a0d;
    border: 1px solid #B8954A;
    color: #D4C28E;
  }

  /* PIED */
  .footer {
    text-align: center;
    margin-top: 28px;
    font-size: 11px;
    color: #444;
    line-height: 1.8;
  }
  .footer a { color: #B8954A; text-decoration: none; }

  /* ESSAIS */
  .essais-info {
    text-align: center;
    font-size: 11px;
    color: #555;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="brand">Verdict 360 AI</div>
    <div class="subtitle">Académie · Formation alimentaire</div>
  </div>

  <div class="card">
    <div class="lock-icon">🎓</div>
    <h1>Accéder à ma formation</h1>
    <p>Entrez votre code d'accès personnel</p>

    <div class="message" id="message"></div>

    <input
      type="tel"
      class="code-input"
      id="codeInput"
      placeholder="000000"
      maxlength="6"
      inputmode="numeric"
      autocomplete="off"
    >

    <button class="btn" id="btnValider" onclick="validerCode()">
      Valider mon accès →
    </button>

    <div class="essais-info" id="essaisInfo"></div>
  </div>

  <div class="footer">
    Besoin d'un code ?<br>
    <a href="mailto:info@verdict360ai.com">info@verdict360ai.com</a> · 
    <a href="tel:+18738221455">+1 (873) 822-1455</a><br><br>
    <a href="https://verdict360ai.com">verdict360ai.com</a>
  </div>

</div>

<script>
const WORKER_URL = "https://academie.mjacquesperrier.workers.dev";
const ACADEMIE_URL = "https://academie.fragrant-pond-3bd6.workers.dev";

function showMessage(text, type) {
  const el = document.getElementById("message");
  el.textContent = text;
  el.className = `message ${type}`;
}

async function validerCode() {
  const code = document.getElementById("codeInput").value.trim();
  const btn = document.getElementById("btnValider");
  const essaisInfo = document.getElementById("essaisInfo");

  if (code.length !== 6) {
    showMessage("Entrez votre code à 6 chiffres.", "error");
    return;
  }

  btn.disabled = true;
  showMessage("Vérification en cours…", "loading");

  try {
    const res = await fetch(`${WORKER_URL}/valider-code`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code })
    });

    const data = await res.json();

    if (data.success) {
      showMessage(`✅ Accès accordé — ${data.programme === "manipulateur" ? "Manipulateur d'aliments" : "Gestionnaire d'établissement"}. Redirection…`, "success");
      
      // Redirection vers l'ACADÉMIE après 1.5 secondes
      setTimeout(() => {
        window.location.href = ACADEMIE_URL;
      }, 1500);

    } else {
      showMessage(data.erreur || "Code invalide.", "error");
      btn.disabled = false;

      if (data.erreur && data.erreur.includes("3 tentatives")) {
        essaisInfo.textContent = "Ce code est désactivé. Contactez votre responsable.";
        btn.disabled = true;
      }
    }

  } catch (e) {
    showMessage("Erreur de connexion. Réessayez.", "error");
    btn.disabled = false;
  }
}

// Validation sur Enter
document.getElementById("codeInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") validerCode();
});

// Format automatique — chiffres seulement
document.getElementById("codeInput").addEventListener("input", function() {
  this.value = this.value.replace(/\D/g, "").slice(0, 6);
});
</script>

</body>
</html>
